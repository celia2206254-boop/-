<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>认知健康管理中心 | 专业自测+智能方案</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f7fc; color: #1e293b; }
        .app-wrapper { max-width: 500px; margin: 0 auto; background: #f4f7fc; min-height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding-bottom: 85px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.94); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 20px 28px; border-top: 0.5px solid rgba(0,0,0,0.08); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 6px 14px; border-radius: 40px; opacity: 0.55; color: #5b6e8c; }
        .nav-item.active { opacity: 1; color: #0f6e3f; background: rgba(15,110,63,0.08); }
        .nav-icon { width: 26px; height: 26px; fill: currentColor; }
        .nav-label { font-size: 11px; font-weight: 500; }
        .card { background: white; border-radius: 36px; padding: 24px 22px; margin: 16px; }
        .hero-card { background: linear-gradient(135deg, #f0f9f3 0%, #ffffff 100%); border-radius: 44px; margin: 20px 16px; padding: 32px 26px; }
        .hero-tag { font-size: 13px; color: #0f6e3f; font-weight: 600; background: rgba(15,110,63,0.12); display: inline-block; padding: 6px 14px; border-radius: 40px; margin-bottom: 20px; }
        .hero-title { font-size: 38px; font-weight: 800; line-height: 1.15; margin-bottom: 14px; color: #1a2c3e; }
        .hero-sub { font-size: 18px; font-weight: 500; color: #2c5a7a; margin-bottom: 32px; border-left: 4px solid #0f6e3f; padding-left: 14px; }
        .btn-primary { background: #0f6e3f; color: white; width: 100%; padding: 18px 16px; font-size: 17px; font-weight: 700; border-radius: 60px; border: none; cursor: pointer; }
        .btn-outline { background: white; border: 1.5px solid #0f6e3f; color: #0f6e3f; font-weight: 600; padding: 14px 18px; border-radius: 60px; width: 100%; cursor: pointer; }
        .device-showcase { background: white; border-radius: 36px; margin: 16px; padding: 24px 22px; }
        .quiz-card { background: white; border-radius: 40px; margin: 20px 16px; padding: 28px 22px; }
        .question-text { font-weight: 720; font-size: 24px; margin: 20px 0 32px; text-align: center; }
        .option-btn { padding: 16px; border: 1.5px solid #e2e8f0; border-radius: 60px; background: white; font-size: 16px; margin-bottom: 12px; width: 100%; cursor: pointer; }
        .option-btn.selected { background: #0f6e3f; border-color: #0f6e3f; color: white; }
        .progress-bar { background: #eef2f7; border-radius: 20px; height: 7px; margin: 10px 0; }
        .progress-fill { background: #0f6e3f; height: 7px; border-radius: 20px; width: 0%; }
        .score-circle { width: 130px; height: 130px; background: #eef5ff; border-radius: 50%; margin: 12px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .risk-low { color: #10b981; }
        .risk-mid { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        .risk-level { font-size: 28px; font-weight: 800; margin: 12px 0; }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e2b3c; color: white; padding: 10px 20px; border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.18s; pointer-events: none; z-index: 2000; }
        .share-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn-share { flex: 1; background: #0f6e3f; color: white; border: none; border-radius: 60px; padding: 12px; font-weight: 600; cursor: pointer; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-input, .profile-input { padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 60px; font-size: 16px; width: 100%; }
        .auth-switch { text-align: center; margin-top: 16px; color: #0f6e3f; cursor: pointer; }
        .footer-links { text-align: center; font-size: 12px; color: #7a98b5; padding: 24px 16px 32px; margin-top: 20px; }
        .history-item { background: #f8fafc; border-radius: 20px; padding: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .history-score { font-size: 24px; font-weight: 800; color: #0f6e3f; }
        .history-date { font-size: 12px; color: #94a3b8; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eef2f7; }
        .info-label { font-weight: 600; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="main-content" id="mainContent"></div>
    <div class="bottom-nav">
        <div class="nav-item" data-tab="home"><span class="nav-label">认知评估</span></div>
        <div class="nav-item" data-tab="device"><span class="nav-label">智能设备</span></div>
        <div class="nav-item" data-tab="profile"><span class="nav-label">我的页面</span></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
(function(){
    const SUPABASE_URL = 'https://odztrbmvxnrqqqfywrym.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_-YmD5UHc2TUtLpcR6KgTnw_kddcL5Lo';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let currentTab = "home";
    let quizActive = false;
    let answers = new Array(20).fill(null);
    let currentIndex = 0;
    let authMode = "login";
    let isEditing = false;
    let userProfile = { gender: '', age: null };
    
    const QUESTIONS = [
        "最近是否经常忘记刚说过的话？", "是否常忘记东西放在哪里？", "是否重复询问同一件事？",
        "是否忘记约定或日期？", "是否记不住最近发生的事？", "是否常搞不清今天星期几？",
        "是否分不清月份或季节？", "是否去熟悉地方也容易迷路？", "是否常叫不出熟悉物品名称？",
        "说话时是否常卡住找词？", "是否表达内容混乱？", "是否听不懂复杂说明？",
        "是否不会使用熟悉家电？", "是否缴费、算账变困难？", "是否做饭步骤容易混乱？",
        "是否需要别人提醒洗澡吃药？", "是否脾气变化明显？", "是否变得多疑敏感？",
        "是否兴趣明显下降？", "是否社交意愿下降？"
    ];
    const OPTIONS = [
        { label: "无异常", rawScore: 0 },
        { label: "偶尔出现", rawScore: 1 },
        { label: "经常出现", rawScore: 2 },
        { label: "明显频繁", rawScore: 3 }
    ];
    const MAX_RAW = 60;
    const SHARE_URL = "https://www.renzhiceshi.online/";
    
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        if(toast) { toast.textContent = msg; toast.style.opacity = '1'; setTimeout(() => { toast.style.opacity = '0'; }, 2000); }
    }
    
    function getTotalRaw() { let s=0; for(let v of answers) if(v!==null) s+=v; return s; }
    function getPercentScore() { return Math.round((getTotalRaw()/MAX_RAW)*100); }
    function getRiskLevel(score) {
        if(score<=25) return { name:'低风险', class:'risk-low', desc:'当前认知状态总体稳定。' };
        if(score<=50) return { name:'中风险', class:'risk-mid', desc:'存在一定认知下降倾向。' };
        return { name:'高风险', class:'risk-high', desc:'认知功能需引起关注。' };
    }
    function getRiskText(score) {
        if(score<=25) return '低风险';
        if(score<=50) return '中风险';
        return '高风险';
    }
    
    async function loadUserProfile() {
        if(!currentUser) return;
        try {
            const { data } = await supabase.from('profiles').select('gender,age').eq('id',currentUser.id).single();
            if(data) { userProfile.gender = data.gender||''; userProfile.age = data.age||null; }
        } catch(e) {}
    }
    
    async function updateUserProfile(gender,age) {
        if(!currentUser) return;
        await supabase.from('profiles').upsert({ id:currentUser.id, email:currentUser.email, gender:gender, age:age?parseInt(age):null });
        userProfile.gender = gender; userProfile.age = age;
        showToast("资料已更新");
        render();
    }
    
    async function saveScoreToSupabase(score) {
        if(!currentUser) return;
        await supabase.from('profiles').upsert({ id:currentUser.id, email:currentUser.email, cognitive_score:score });
        await supabase.from('assessment_history').insert({ user_id:currentUser.id, score:score, risk_level:getRiskText(score) });
    }
    
    async function loadUserScore() {
        if(!currentUser) return null;
        try {
            const { data } = await supabase.from('profiles').select('cognitive_score').eq('id',currentUser.id).single();
            return data?.cognitive_score||null;
        } catch(e){ return null; }
    }
    
    async function loadHistory() {
        if(!currentUser) return [];
        try {
            const { data } = await supabase.from('assessment_history').select('score,risk_level,created_at').eq('user_id',currentUser.id).order('created_at',{ascending:false});
            return data||[];
        } catch(e){ return []; }
    }
    
    function renderHome() {
        let status = currentUser ? `<div style="background:#eef6f1;border-radius:30px;padding:12px;margin:16px;text-align:center;">👋 ${currentUser.email} <button id="logoutBtn" style="margin-left:12px;border:1px solid #0f6e3f;border-radius:20px;padding:4px 12px;">退出</button></div>` : `<div style="background:#eef6f1;border-radius:30px;padding:12px;margin:16px;text-align:center;">👤 未登录 · <span id="gotoAuthBtn" style="color:#0f6e3f;cursor:pointer;">点击登录</span></div>`;
        return status + `<div class="hero-card"><div class="hero-tag">🧠 认知健康评估</div><div class="hero-title">3分钟自测</div><div class="hero-sub">快速了解认知状态</div><button class="btn-primary" id="startQuizBtn">开始评估 →</button></div>
        <div class="device-showcase"><div class="device-header"><h3>⌚ 华为手环</h3><button class="btn-small" id="gotoDeviceBtn">查看详情</button></div><div class="device-desc">睡眠监测 + 活动轨迹提醒</div></div>`;
    }
    
    function renderDevice() {
        return `<div class="card"><h2>⌚ 华为手环</h2><p>专为认知健康设计</p><div style="background:#f0f9f4;padding:20px;border-radius:28px;margin-top:16px;"><h3>核心功能</h3><ul><li>💤 睡眠监测</li><li>🚶 活动轨迹提醒</li></ul><button class="btn-primary" id="deviceContactBtn" style="margin-top:16px;">咨询详情</button></div></div>`;
    }
    
    async function renderProfile() {
        if(!currentUser) return `<div class="card"><h2 style="text-align:center;">登录/注册</h2><div class="auth-form"><input type="email" id="authEmail" class="auth-input" placeholder="邮箱"><input type="password" id="authPassword" class="auth-input" placeholder="密码"><button class="btn-primary" id="authSubmitBtn">${authMode==='login'?'登录':'注册'}</button></div><div class="auth-switch" id="authSwitchBtn">${authMode==='login'?'没有账号？注册':'已有账号？登录'}</div></div>`;
        
        await loadUserProfile();
        let latestScore = await loadUserScore();
        let historyList = await loadHistory();
        let historyHtml = '<h3>历史评估</h3>';
        if(historyList.length===0) historyHtml += '<p style="color:#94a3b8;">暂无记录</p>';
        else for(let h of historyList) {
            let d = new Date(h.created_at);
            historyHtml += `<div class="history-item"><div><div class="history-score">${h.score}分</div><div class="history-date">${d.getMonth()+1}/${d.getDate()}</div></div><div>${h.risk_level}</div></div>`;
        }
        
        if(isEditing) {
            return `<div class="card"><h3>编辑资料</h3><input type="text" id="editGender" class="profile-input" placeholder="性别" value="${userProfile.gender||''}"><input type="number" id="editAge" class="profile-input" placeholder="年龄" value="${userProfile.age||''}"><button class="btn-primary" id="saveProfileBtn">保存</button><button class="btn-outline" id="cancelEditBtn" style="margin-top:12px;">取消</button></div>
            <div class="card">${historyHtml}<button class="btn-outline" id="historyTestBtn" style="margin-top:16px;">开始新评估</button></div>`;
        }
        
        return `<div class="card"><div style="display:flex;justify-content:space-between;"><div><h3>我的档案</h3><p style="color:#94a3b8;">${currentUser.email}</p></div><div><button id="logoutProfileBtn" style="background:#f0f0f0;border:none;border-radius:20px;padding:8px 16px;">退出</button><button id="editProfileBtn" style="margin-left:8px;background:#eef2f7;border:none;border-radius:20px;padding:8px 16px;">编辑</button></div></div>
        <div class="info-row"><span>性别</span><span>${userProfile.gender||'未设置'}</span></div>
        <div class="info-row"><span>年龄</span><span>${userProfile.age||'未设置'}</span></div>
        <div class="info-row"><span>最近评分</span><span style="font-weight:800;color:#0f6e3f;">${latestScore!==null?latestScore+'分':'暂无'}</span></div></div>
        <div class="card">${historyHtml}<button class="btn-outline" id="historyTestBtn" style="margin-top:16px;">开始新评估</button></div>`;
    }
    
    function renderQuiz() {
        let opts = '';
        for(let opt of OPTIONS) {
            opts += `<button class="option-btn ${answers[currentIndex]===opt.rawScore?'selected':''}" onclick="selectAnswer(${opt.rawScore})">${opt.label}</button>`;
        }
        return `<div class="quiz-card"><div class="progress-bar"><div class="progress-fill" style="width:${(currentIndex/QUESTIONS.length)*100}%"></div></div><div class="question-text">${QUESTIONS[currentIndex]}</div>${opts}<button class="btn-outline" id="prevBtn" ${currentIndex===0?'disabled':''}>上一题</button></div>`;
    }
    
    function renderResult() {
        let score = getPercentScore();
        let risk = getRiskLevel(score);
        return `<div class="card"><div id="captureArea"><h2>评估报告</h2><div class="score-circle"><span style="font-size:48px;">${score}</span><span>/100</span></div><div class="risk-level ${risk.class}">${risk.name}</div><div>${risk.desc}</div></div><div class="share-buttons"><button class="btn-share" id="shareImgBtn">保存图片</button><button class="btn-share" id="shareUrlBtn">分享网址</button></div><button class="btn-outline" id="restartBtn">重新评估</button></div>`;
    }
    
    async function render() {
        let container = document.getElementById('mainContent');
        if(!container) return;
        let html = '';
        if(quizActive) html = renderQuiz();
        else if(currentTab === 'home') html = renderHome();
        else if(currentTab === 'device') html = renderDevice();
        else if(currentTab === 'profile') html = await renderProfile();
        else if(currentTab === 'result') html = renderResult();
        else html = renderHome();
        container.innerHTML = html;
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            let tab = nav.getAttribute('data-tab');
            if(currentTab === tab || (currentTab==='result' && tab==='home')) nav.classList.add('active');
            else nav.classList.remove('active');
        });
        
        document.getElementById('startQuizBtn')?.addEventListener('click', ()=>{ quizActive=true; answers.fill(null); currentIndex=0; render(); });
        document.getElementById('gotoDeviceBtn')?.addEventListener('click', ()=>{ currentTab='device'; render(); });
        document.getElementById('historyTestBtn')?.addEventListener('click', ()=>{ quizActive=true; answers.fill(null); currentIndex=0; render(); });
        document.getElementById('restartBtn')?.addEventListener('click', ()=>{ quizActive=true; answers.fill(null); currentIndex=0; render(); });
        document.getElementById('prevBtn')?.addEventListener('click', ()=>{ if(currentIndex>0){ currentIndex--; render(); } });
        document.getElementById('logoutBtn')?.addEventListener('click', async()=>{ await supabase.auth.signOut(); currentUser=null; render(); });
        document.getElementById('logoutProfileBtn')?.addEventListener('click', async()=>{ await supabase.auth.signOut(); currentUser=null; render(); });
        document.getElementById('gotoAuthBtn')?.addEventListener('click', ()=>{ currentTab='profile'; render(); });
        document.getElementById('editProfileBtn')?.addEventListener('click', ()=>{ isEditing=true; render(); });
        document.getElementById('cancelEditBtn')?.addEventListener('click', ()=>{ isEditing=false; render(); });
        document.getElementById('saveProfileBtn')?.addEventListener('click', async()=>{
            let g = document.getElementById('editGender')?.value||'';
            let a = document.getElementById('editAge')?.value||'';
            await updateUserProfile(g,a);
            isEditing=false;
            render();
        });
        document.getElementById('deviceContactBtn')?.addEventListener('click', ()=>showToast("请联系客服"));
        document.getElementById('shareImgBtn')?.addEventListener('click', async()=>{
            let el = document.getElementById('captureArea');
            if(el){ let c = await html2canvas(el); let link=document.createElement('a'); link.download='report.png'; link.href=c.toDataURL(); link.click(); showToast("已保存"); }
        });
        document.getElementById('shareUrlBtn')?.addEventListener('click', ()=>{ navigator.clipboard.writeText(SHARE_URL); showToast("网址已复制"); });
        
        let authSubmit = document.getElementById('authSubmitBtn');
        if(authSubmit) {
            authSubmit.onclick = async()=>{
                let email = document.getElementById('authEmail')?.value;
                let pwd = document.getElementById('authPassword')?.value;
                if(!email||!pwd){ showToast("请填写完整"); return; }
                if(authMode==='login'){
                    let { data, error } = await supabase.auth.signInWithPassword({ email, password:pwd });
                    if(error){ showToast(error.message); return; }
                    currentUser = data.user;
                    showToast("登录成功");
                    currentTab='home';
                    render();
                } else {
                    let { data, error } = await supabase.auth.signUp({ email, password:pwd });
                    if(error){ showToast(error.message); return; }
                    if(data.user){
                        await supabase.from('profiles').upsert({ id:data.user.id, email:email });
                        showToast("注册成功，请查收邮件");
                        authMode='login';
                        render();
                    }
                }
            };
        }
        let authSwitch = document.getElementById('authSwitchBtn');
        if(authSwitch) authSwitch.onclick = ()=>{ authMode = authMode==='login'?'register':'login'; render(); };
    }
    
    window.selectAnswer = function(score) {
        if(!quizActive) return;
        answers[currentIndex] = score;
        if(currentIndex+1 < QUESTIONS.length) { currentIndex++; render(); }
        else {
            let finalScore = getPercentScore();
            quizActive = false;
            currentTab = 'result';
            if(currentUser) saveScoreToSupabase(finalScore);
            render();
        }
    };
    
    async function init() {
        let { data:{ user } } = await supabase.auth.getUser();
        if(user) currentUser = user;
        render();
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', ()=>{
                let tab = nav.getAttribute('data-tab');
                if(tab === 'home') { quizActive=false; currentTab='home'; render(); }
                else if(tab === 'device') { quizActive=false; currentTab='device'; render(); }
                else if(tab === 'profile') { quizActive=false; currentTab='profile'; render(); }
            });
        });
    }
    init();
})();
</script>
</body>
</html>
