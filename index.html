            padding: 0;

            -webkit-tap-highlight-color: transparent;

        body {

        .app-wrapper {
            max-width: 500px;
            margin: 0 auto;
            background: #f4f7fc;

            flex-direction: column;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.02);
        }

        .main-content {
            flex: 1;
            padding-bottom: 85px;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px 28px;
            border-top: 0.5px solid rgba(0,0,0,0.08);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
            z-index: 1000;
            padding-bottom: calc(28px + env(safe-area-inset-bottom, 20px));
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s ease;
            padding: 6px 14px;
            border-radius: 40px;
            opacity: 0.55;
            color: #5b6e8c;
            background: transparent;
        }
        .nav-item.active {
            opacity: 1;
            color: #0f6e3f;
            font-weight: 510;
            background: rgba(15,110,63,0.08);
        }
        .nav-icon {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }
        .nav-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .card {
            background: white;
            border-radius: 36px;
            padding: 24px 22px;
            margin: 16px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0,0,0,0.03);
        }

        .hero-card {
            background: linear-gradient(135deg, #f0f9f3 0%, #ffffff 100%);

            margin: 20px 16px;
            padding: 32px 26px;

            border: 0.5px solid rgba(15,110,63,0.2);
        }
        .hero-tag {

            color: #0f6e3f;
            font-weight: 600;

            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            margin-bottom: 20px;
            backdrop-filter: blur(2px);
        }
        .hero-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 14px;
            color: #1a2c3e;

        .hero-sub {
            font-size: 18px;
            font-weight: 500;
            color: #2c5a7a;
            margin-bottom: 32px;

        .btn-primary {
            background: #0f6e3f;
            color: white;
            width: 100%;
            padding: 18px 16px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 60px;

            box-shadow: 0 8px 20px rgba(15,110,63,0.28);

        .btn-primary:active { background: #0a5833; transform: scale(0.97);}
        .btn-outline {
            background: white;
            border: 1.5px solid #0f6e3f;
            color: #0f6e3f;
            font-weight: 600;
            padding: 14px 18px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        .btn-outline:active { background: #eef6f1; transform: scale(0.97);}
        
        .device-showcase {
            background: linear-gradient(110deg, #ffffff 0%, #f8fdf9 100%);

            margin: 16px;
            padding: 24px 22px;
            border: 0.5px solid #dde9e2;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.03);

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .device-title {
            font-size: 22px;
            font-weight: 720;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .device-desc {

            color: #3c6485;
            margin: 16px 0;

        .btn-small {

            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #0f6e3f;
            cursor: pointer;
            transition: 0.15s;

        .quiz-card {
            background: white;
            border-radius: 40px;
            margin: 20px 16px;
            padding: 28px 22px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
        }
        .question-text {
            font-weight: 720;
            font-size: 24px;
            margin: 20px 0 32px;
            text-align: center;
            line-height: 1.35;
        }
        .option-btn {
            padding: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: white;
            font-size: 16px;
            font-weight: 510;
            margin-bottom: 12px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        .option-btn.selected {
            background: #0f6e3f;
            border-color: #0f6e3f;
            color: white;
        }
        .progress-bar {
            background: #eef2f7;
            border-radius: 20px;
            height: 7px;
            margin: 10px 0 12px;
        }
        .progress-fill {
            background: #0f6e3f;
            height: 7px;
            border-radius: 20px;
            width: 0%;
        }

        .faq-item {
            border-bottom: 1px solid #edf2f7;

        }
        .faq-question {
            font-weight: 680;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-size: 17px;
            color: #1f3a4c;
        }
        .faq-answer {

            color: #557da5;
            padding-top: 12px;
            line-height: 1.45;
            display: none;
        }
        .faq-answer.show {

        }
        .footer-links {
            text-align: center;
            font-size: 12px;
            color: #7a98b5;
            padding: 24px 16px 32px;
            border-top: 0.5px solid #e6edf4;
            margin-top: 20px;
        }
        .footer-links a {
            text-decoration: none;
            color: #2f6b47;
            margin: 0 6px;
        }

        .score-circle {
            width: 130px;
            height: 130px;
            background: #eef5ff;
            border-radius: 50%;
            margin: 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: inset 0 0 0 4px white, 0 8px 20px rgba(0,0,0,0.05);
        }
        .risk-low { color: #10b981; }
        .risk-mid { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        .ai-assessment {
            background: #f0f5fe;
            padding: 18px;
            border-radius: 28px;
            margin: 20px 0 0 0;
            font-size: 15px;
            line-height: 1.45;
        }
        .ai-assessment .risk-desc-inline {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(100, 116, 139, 0.2);
            font-size: 14px;
            color: #2c5a7a;
        }
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2b3c;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: 0.18s;
            pointer-events: none;
            z-index: 2000;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 85vw;
        }
        .risk-level {
            font-size: 28px;
            font-weight: 800;
            margin: 12px 0;
        }
        .feature-badge {
            background: #eef2ff;
            padding: 8px 16px;
            border-radius: 80px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .report-capture-area {
            background: white;
            border-radius: 36px;
            padding: 20px;
        }
        .share-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 8px;
        }
        .btn-share {
            flex: 1;
            background: #0f6e3f;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-share-outline {
            background: white;
            border: 1.5px solid #0f6e3f;
            color: #0f6e3f;
        }
        .btn-share:active { transform: scale(0.97);}

        /* 登录/注册表单样式 */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-input {
            padding: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 16px;
            width: 100%;
            background: white;
        }
        .auth-input:focus {
            outline: none;
            border-color: #0f6e3f;
        }
        .auth-switch {
            text-align: center;
            margin-top: 16px;
            color: #0f6e3f;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <div class="bottom-nav" id="bottomNav">

<div id="toastMsg" class="toast-msg"></div>

<script>
    // ==================== Supabase 配置 ====================
    const SUPABASE_URL = 'https://odztrbmvxnrqqqfywrym.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_-YmD5UHc2TUtLpcR6KgTnw_kddcL5Lo';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 全局状态
    let currentUser = null;        // 当前登录用户
    let currentTab = "home";      
    let quizActive = false;        
    let answers = new Array(20).fill(null);
    let currentIndex = 0;
    let authMode = "login";        // "login" 或 "register"

    // 固定问卷题
    const QUESTIONS = [
        "最近是否经常忘记刚说过的话？", "是否常忘记东西放在哪里？", "是否重复询问同一件事？",
        "是否忘记约定或日期？", "是否记不住最近发生的事？", "是否常搞不清今天星期几？",
        "是否分不清月份或季节？", "是否去熟悉地方也容易迷路？", "是否常叫不出熟悉物品名称？",
        "说话时是否常卡住找词？", "是否表达内容混乱？", "是否听不懂复杂说明？",
        "是否不会使用熟悉家电？", "是否缴费、算账变困难？", "是否做饭步骤容易混乱？",
        "是否需要别人提醒洗澡吃药？", "是否脾气变化明显？", "是否变得多疑敏感？",
        "是否兴趣明显下降？", "是否社交意愿下降？"
    ];
    const OPTIONS = [
        { label: "无异常", rawScore: 0 },
        { label: "偶尔出现", rawScore: 1 },
        { label: "经常出现", rawScore: 2 },
        { label: "明显频繁", rawScore: 3 }
    ];
    const MAX_RAW = 60;
    const SHARE_URL = "https://www.renzhiceshi.online/";

    // ==================== 辅助函数 ====================
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => { if(toast) toast.style.opacity = '0'; }, 2200);
    }

    function getTotalRaw() {
        let sum = 0;
        for(let v of answers) if(v !== null) sum += v;
        return sum;
    }
    function getPercentScore() {
        return Math.round((getTotalRaw() / MAX_RAW) * 100);
    }
    function getRiskLevel(score) {
        if(score <= 25) return { name:'低风险', class:'risk-low', desc:'当前认知状态总体稳定，保持健康生活习惯即可。' };
        if(score <= 50) return { name:'中风险', class:'risk-mid', desc:'存在一定认知下降倾向，建议加强脑力活动并定期复查。' };
        return { name:'高风险', class:'risk-high', desc:'认知功能需引起关注，建议加强日常监测，保持积极生活方式。' };
    }
    function generateAI(percent, raw) {
        if(percent <= 25) return "🤖 AI分析：您的认知功能整体表现良好，记忆与执行能力未见明显异常。继续保持社交与脑力活动。";
        if(percent <= 50) return "🤖 AI提示：存在轻度认知功能波动，尤其是在近期记忆或定向方面。建议每日健脑训练、规律作息，并监测变化。";
        return "🤖 AI预警：认知功能下降风险显著，多个维度出现异常信号。建议进行更详细的健康管理及医学咨询。";
    }

    // 保存评估结果到 Supabase
    async function saveScoreToSupabase(score) {
        if (!currentUser) {
            console.log("未登录，不保存成绩");
            return;
        }
        try {
            const { error } = await supabase
                .from('profiles')
                .upsert({ 
                    id: currentUser.id, 
                    email: currentUser.email,
                    cognitive_score: score,
                    updated_at: new Date().toISOString()
                });
            if (error) {
                console.error("保存失败:", error);
            } else {
                console.log("保存成功");
            }
        } catch (err) {
            console.error("保存出错:", err);
        }
    }

    // 加载用户的历史评估分数
    async function loadUserScore() {
        if (!currentUser) return null;
        try {
            const { data, error } = await supabase
                .from('profiles')
                .select('cognitive_score')
                .eq('id', currentUser.id)
                .single();
            if (error && error.code !== 'PGRST116') {
                console.error("加载失败:", error);
                return null;
            }
            return data?.cognitive_score || null;
        } catch (err) {
            console.error("加载出错:", err);
            return null;
        }
    }

    // 登出
    async function handleLogout() {
        await supabase.auth.signOut();
        currentUser = null;
        showToast("已退出登录");
        render();
    }

    // ==================== 认证 UI ====================
    function renderAuth() {
        return `
            <div class="card" style="margin-top: 40px;">
                <h2 style="text-align:center; margin-bottom: 28px;">${authMode === 'login' ? '登录' : '注册'}</h2>
                <div class="auth-form">
                    <input type="email" id="authEmail" class="auth-input" placeholder="邮箱" autocomplete="email">
                    <input type="password" id="authPassword" class="auth-input" placeholder="密码（至少6位）" autocomplete="${authMode === 'login' ? 'current-password' : 'new-password'}">
                    <button class="btn-primary" id="authSubmitBtn">${authMode === 'login' ? '登录' : '注册'}</button>
                </div>
                <div class="auth-switch" id="authSwitchBtn">
                    ${authMode === 'login' ? '没有账号？点击注册' : '已有账号？点击登录'}
                </div>
            </div>
        `;
    }

    // ==================== 各页面渲染 ====================
    function renderHome() {
        // 如果已登录，显示用户名
        const loginStatus = currentUser ? 
            `<div style="background:#eef6f1; border-radius: 30px; padding: 12px 20px; margin-bottom: 16px; text-align:center;">
                👋 欢迎回来，${currentUser.email}
                <button id="logoutHomeBtn" style="margin-left: 12px; background:none; border:1px solid #0f6e3f; border-radius:20px; padding:4px 12px; cursor:pointer;">退出</button>
             </div>` : 
            `<div style="background:#eef6f1; border-radius: 30px; padding: 12px 20px; margin-bottom: 16px; text-align:center;">
                👤 未登录 · <span id="gotoAuthBtn" style="color:#0f6e3f; font-weight:600; cursor:pointer;">点击登录/注册</span>
             </div>`;
        
        return `
            ${loginStatus}
            <div class="hero-card">
                <div class="hero-tag">🧠 官方推荐 · 居家智能监测</div>
                <div class="hero-title">父母最近<br>总忘事？</div>
                <div class="hero-sub">3分钟认知健康评估<br>+居家智能监测方案</div>
                <button class="btn-primary" id="startFreeEvalBtn">立即免费评估 →</button>
            </div>
            <div class="device-showcase" id="devicePreviewCard">
                <div class="device-header">
                    <div class="device-title"><span>⌚ 华为手环</span></div>
                    <button class="btn-small" id="gotoDeviceFromHome">点击查看 →</button>
                </div>
                <div class="device-desc">🏠 专业认知辅助 · 无感监测长者睡眠与日常活动轨迹，异常行为及时提醒。</div>
                <div style="display: flex; gap: 12px; margin-top: 16px; flex-wrap:wrap;">
                    <span class="feature-badge">💤 睡眠监测</span>
                    <span class="feature-badge">🚶 活动轨迹异常提醒</span>
                </div>
            </div>
        `;
    }

    function renderDevice() {
        return `
            <div class="card" style="margin-top:20px;">
                <div style="display:flex; align-items:center; gap:14px; margin-bottom:12px;">
                    <span style="font-size:48px;">⌚</span>
                    <h2 style="font-size:30px; letter-spacing:-0.5px;">华为手环</h2>
                </div>
                <p style="color:#2b6e4e; font-weight:500; margin-bottom:20px;">专为认知健康及长者安全设计的智能可穿戴设备</p>
                <div style="background:#f0f9f4; border-radius:32px; padding:24px; margin-bottom:20px;">
                    <div style="font-weight:800; font-size:20px; margin-bottom:18px;">🎯 核心认知守护功能</div>
                    <ul style="margin-left: 20px; list-style:disc; color:#285e41; display:flex; flex-direction:column; gap:12px;">
                        <li><strong>💤 睡眠监测</strong> – 精准记录深睡/浅睡/REM，分析睡眠规律与认知健康关联性，异常睡眠模式及时推送亲属端。</li>
                        <li><strong>🚶 活动轨迹异常提醒</strong> – 基于AI行为模型，识别久坐、夜间离床、异常徘徊等轨迹变化，预防跌倒与走失风险。</li>
                        <li><strong>📅 认知健康周报</strong> – 结合日常活动与睡眠数据生成认知趋势分析，辅助家人远程掌握状态。</li>
                    </ul>
                    <button class="btn-primary" id="deviceContactBtn" style="margin-top:28px; background:#0f6e3f;">点击查看 购买/安装详情 →</button>
                </div>
            </div>
        `;
    }

    function renderProfile() {
        // 未登录时直接显示登录界面

    function renderQuiz() {
        const progress = ((currentIndex) / QUESTIONS.length) * 100;
        const question = QUESTIONS[currentIndex];
        const selectedVal = answers[currentIndex];
        let optsHtml = '';
        for(let opt of OPTIONS) {
            const isSel = (selectedVal === opt.rawScore);
            optsHtml += `<button class="option-btn ${isSel ? 'selected' : ''}" onclick="window.selectAnswerHandler(${opt.rawScore})">${opt.label}</button>`;
        }
        return `
