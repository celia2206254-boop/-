<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>认知功能专业自测 - 健康评估</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }

        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #1e293b;
            letter-spacing: -0.3px;
        }

        .subtitle {
            text-align: center;
            color: #5b6e8c;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #0f6e3f;
            color: white;
            box-shadow: 0 2px 8px rgba(15,110,63,0.2);
        }
        .btn-primary:active { background: #0a5833; transform: scale(0.98); }

        .btn-secondary {
            background: #475569;
            color: white;
        }
        .btn-secondary:active { background: #334155; transform: scale(0.98); }

        .btn-share-link {
            background: #3b82f6;
            color: white;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share-link:active { background: #2563eb; transform: scale(0.98); }
        
        .btn-share-poster {
            background: #8b5cf6;
            color: white;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share-poster:active { background: #7c3aed; transform: scale(0.98); }
        
        .btn-icon-svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* 进度区域 */
        .quiz-header {
            margin-bottom: 24px;
        }
        .counter-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .question-counter {
            font-size: 15px;
            font-weight: 600;
            color: #0f6e3f;
            background: #e6f7ef;
            padding: 4px 16px;
            border-radius: 40px;
            display: inline-block;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 12px 0 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #0f6e3f;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-weight: 700;
            font-size: 22px;
            color: #0f172a;
            margin: 32px 0 36px;
            line-height: 1.4;
            text-align: center;
            padding: 0 4px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        .option-btn {
            padding: 16px 20px;
            border: 1.5px solid #cbd5e1;
            border-radius: 60px;
            background: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #1e293b;
            transition: all 0.2s;
            text-align: center;
        }
        .option-btn.selected {
            background: #0f6e3f;
            border-color: #0f6e3f;
            color: white;
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(15,110,63,0.3);
        }
        .option-btn:active { transform: scale(0.98); background: #f1f5f9; }
        .option-btn.selected:active { background: #0a5833; }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .nav-btn {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: 600;
            cursor: pointer;
            color: #334155;
            transition: 0.2s;
            font-size: 15px;
        }
        .nav-btn:active { background: #e2e8f0; }
        .nav-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* 结果页 */
        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f1f5f9 0%, #e6edf5 100%);
            margin: 10px auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }
        .score-number {
            font-size: 48px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
        }
        .score-max {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
            font-weight: 500;
        }
        .risk-level {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .risk-low { color: #10b981; }
        .risk-mid { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        
        /* AI评估样式 */
        .ai-assessment {
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            padding: 20px;
            border-radius: 28px;
            margin: 20px 0;
            border-left: 5px solid #3b82f6;
        }
        .ai-title {
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e3a8a;
        }
        .ai-text {
            font-size: 15px;
            line-height: 1.6;
            color: #1e293b;
        }
        
        .result-desc {
            background: #f8fafc;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            line-height: 1.55;
            color: #1e293b;
            font-size: 15px;
        }
        .suggest-box {
            background: #fefce8;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            border-left: 5px solid #eab308;
        }
        .suggest-title {
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .suggest-list {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .suggest-list li {
            margin-bottom: 6px;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 2000;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .footer-note {
            font-size: 11px;
            text-align: center;
            color: #94a3b8;
            margin-top: 16px;
        }

        /* 海报遮罩 */
        .poster-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .poster-card {
            background: white;
            border-radius: 36px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            padding: 20px 20px 28px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            position: relative;
        }
        .poster-close {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 300;
        }
        .poster-close:hover { color: #475569; }
        .btn-download {
            background: #0f6e3f;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 44px;
            margin-top: 18px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
        }
        .poster-img-preview {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // 20题内容
    const questions = [
        "最近是否经常忘记刚说过的话？",
        "是否常忘记东西放在哪里？",
        "是否重复询问同一件事？",
        "是否忘记约定或日期？",
        "是否记不住最近发生的事？",
        "是否常搞不清今天星期几？",
        "是否分不清月份或季节？",
        "是否去熟悉地方也容易迷路？",
        "是否常叫不出熟悉物品名称？",
        "说话时是否常卡住找词？",
        "是否表达内容混乱？",
        "是否听不懂复杂说明？",
        "是否不会使用熟悉家电？",
        "是否缴费、算账变困难？",
        "是否做饭步骤容易混乱？",
        "是否需要别人提醒洗澡吃药？",
        "是否脾气变化明显？",
        "是否变得多疑敏感？",
        "是否兴趣明显下降？",
        "是否社交意愿下降？"
    ];
    
    const optionItems = [
        { label: "无异常", rawScore: 0 },
        { label: "偶尔出现", rawScore: 1 },
        { label: "经常出现", rawScore: 2 },
        { label: "明显频繁", rawScore: 3 }
    ];
    
    const MAX_RAW_SCORE = 60;
    let currentPage = 'home';
    let currentIndex = 0;
    let answers = new Array(20).fill(null);
    let autoTimer = null;
    
    function getTotalRawScore() {
        let sum = 0;
        for (let i = 0; i < answers.length; i++) {
            if (answers[i] !== null) sum += answers[i];
        }
        return sum;
    }
    
    function getPercentageScore() {
        const raw = getTotalRawScore();
        let percent = (raw / MAX_RAW_SCORE) * 100;
        return Math.round(percent);
    }
    
    function getRiskLevel(percentScore) {
        if (percentScore <= 25) return { name: '低风险', class: 'risk-low', desc: '当前认知状态总体稳定，建议持续保持健康生活习惯。' };
        if (percentScore <= 50) return { name: '中风险', class: 'risk-mid', desc: '存在一定认知下降倾向，建议增加观察，并进行专业筛查。' };
        return { name: '高风险', class: 'risk-high', desc: '认知下降风险较高，建议尽快前往医院神经内科或记忆门诊进一步评估。' };
    }
    
    // AI评估文本
    function generateAIAssessment(percentScore, rawScore) {
        let memoryScore = 0, timeOrientationScore = 0, languageScore = 0, dailyAbilityScore = 0, emotionScore = 0;
        for (let i = 0; i < answers.length; i++) {
            const val = answers[i] !== null ? answers[i] : 0;
            if (i < 5) memoryScore += val;
            else if (i < 8) timeOrientationScore += val;
            else if (i < 12) languageScore += val;
            else if (i < 16) dailyAbilityScore += val;
            else emotionScore += val;
        }
        const memoryPercent = (memoryScore / 15) * 100;
        const timePercent = (timeOrientationScore / 9) * 100;
        const languagePercent = (languageScore / 12) * 100;
        const dailyPercent = (dailyAbilityScore / 12) * 100;
        const emotionPercent = (emotionScore / 12) * 100;
        
        let mainIssues = [];
        if (memoryPercent > 40) mainIssues.push("记忆力减退");
        if (timePercent > 40) mainIssues.push("时间地点定向障碍");
        if (languagePercent > 40) mainIssues.push("语言表达困难");
        if (dailyPercent > 40) mainIssues.push("日常生活能力下降");
        if (emotionPercent > 40) mainIssues.push("情绪行为变化");
        
        if (percentScore <= 25) {
            let msg = "根据AI分析，您的认知功能整体处于良好水平。各项指标未见明显异常，大脑健康状态稳定。建议您继续保持现有健康生活方式，定期进行认知训练，维持良好的社交活动。";
            if (mainIssues.length > 0) msg += ` 部分维度（${mainIssues.slice(0,2).join("、")}）有轻微波动，通过针对性训练即可改善。`;
            return msg;
        } else if (percentScore <= 50) {
            let msg = "AI评估提示：您的认知功能存在轻度下降迹象。";
            if (mainIssues.length > 0) msg += ` 主要集中在${mainIssues.join("、")}方面。建议增加脑力活动如记忆游戏、阅读、数独，保证充足睡眠，减少压力。3-6个月后复查。`;
            else msg += "整体功能处于临界状态，建议加强认知锻炼并保持规律作息。";
            return msg;
        } else {
            let msg = "AI评估提示：您的认知功能存在显著下降风险。";
            if (mainIssues.length > 0) msg += ` 尤其在${mainIssues.join("、")}方面表现突出。建议尽快前往医院神经内科或记忆门诊进行全面评估，包括神经心理学检查和影像学检查。早期干预至关重要。`;
            else msg += "综合得分偏高，提示可能存在多方面认知问题，强烈建议尽快就医进行专业诊断，同时开始认知康复训练。";
            msg += " 请注意控制血管危险因素（血压、血糖、血脂）。";
            return msg;
        }
    }
    
    const commonTips = [
        "🏃 每周运动3次以上",
        "😴 保持规律睡眠",
        "❤️ 控制血压血糖血脂",
        "👥 多社交、多交流",
        "📚 每日阅读或记忆训练",
        "🏥 若持续加重请及时就医"
    ];
    
    const CURRENT_URL = window.location.href;
    
    function showToast(msg, duration = 2000) {
        let toast = document.getElementById('global-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'global-toast';
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }
    
    function clearAutoTimer() { if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } }
    function startAutoTimer() {
        if (autoTimer) clearTimeout(autoTimer);
        autoTimer = setTimeout(() => {
            if (currentPage === 'quiz' && answers[currentIndex] !== null) {
                if (currentIndex + 1 < questions.length) { currentIndex++; render(); }
                else { currentPage = 'result'; render(); }
            }
            autoTimer = null;
        }, 1200);
    }
    
    function selectAnswer(rawValue) {
        if (currentPage !== 'quiz') return;
        if (answers[currentIndex] === rawValue) { clearAutoTimer(); startAutoTimer(); render(); return; }
        answers[currentIndex] = rawValue;
        clearAutoTimer();
        render();
        startAutoTimer();
    }
    function prevQuestion() { if (currentPage === 'quiz' && currentIndex > 0) { clearAutoTimer(); currentIndex--; render(); } }
    function resetTest() { clearAutoTimer(); answers = new Array(20).fill(null); currentIndex = 0; currentPage = 'home'; render(); }
    function startTest() { clearAutoTimer(); answers = new Array(20).fill(null); currentIndex = 0; currentPage = 'quiz'; render(); }
    
    async function shareUrl() {
        if (navigator.share && /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            try { await navigator.share({ title: '认知功能自测', text: '测一下认知健康状态', url: CURRENT_URL }); showToast('分享成功 ✓'); return; } 
            catch(e) { if(e.name !== 'AbortError') fallbackCopyUrl(); }
        } else { fallbackCopyUrl(); }
    }
    async function fallbackCopyUrl() { try { await navigator.clipboard.writeText(CURRENT_URL); showToast('🔗 链接已复制'); } catch(e) { let ta = document.createElement('textarea'); ta.value = CURRENT_URL; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('🔗 链接已复制'); } }
    
    // 增强版海报生成 (JPEG格式，大而工整)
    async function generatePosterJPEG() {
        const percentScore = getPercentageScore();
        const risk = getRiskLevel(percentScore);
        const rawScore = getTotalRawScore();
        const aiFullText = generateAIAssessment(percentScore, rawScore);
        const shortAi = aiFullText.length > 150 ? aiFullText.substring(0, 147) + "..." : aiFullText;
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        // 大尺寸高清晰 1080宽
        canvas.width = 1080;
        canvas.height = 1440;
        // 背景 柔和白
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 顶部装饰条
        ctx.fillStyle = '#0f6e3f';
        ctx.fillRect(0, 0, canvas.width, 24);
        
        // 标题
        ctx.font = `bold 52px "PingFang SC", "Segoe UI", system-ui`;
        ctx.fillStyle = '#1e293b';
        ctx.fillText('认知功能自测报告', 70, 110);
        
        ctx.font = `30px system-ui`;
        ctx.fillStyle = '#5b6e8c';
        ctx.fillText('AI智能评估 · 健康分析', 70, 170);
        
        // 分数圆环
        const centerX = canvas.width/2;
        const circleY = 320;
        ctx.beginPath();
        ctx.arc(centerX, circleY, 100, 0, 2 * Math.PI);
        ctx.fillStyle = '#f1f5f9';
        ctx.fill();
        ctx.fillStyle = '#0f172a';
        ctx.font = `bold 68px "SF Mono", monospace`;
        ctx.fillText(`${percentScore}`, centerX-50, circleY+25);
        ctx.font = `28px system-ui`;
        ctx.fillStyle = '#64748b';
        ctx.fillText('/ 100', centerX+35, circleY+15);
        
        // 等级
        let levelColor = risk.class === 'risk-low' ? '#10b981' : (risk.class === 'risk-mid' ? '#f59e0b' : '#ef4444');
        ctx.fillStyle = levelColor;
        ctx.font = `bold 40px system-ui`;
        ctx.fillText(risk.name, centerX-70, circleY+105);
        
        // AI评估框
        ctx.fillStyle = '#eef2ff';
        ctx.shadowColor = 'rgba(0,0,0,0.05)';
        ctx.shadowBlur = 8;
        ctx.fillRect(60, 500, canvas.width-120, 280);
        ctx.shadowColor = 'transparent';
        ctx.fillStyle = '#1e3a8a';
        ctx.font = `bold 32px system-ui`;
        ctx.fillText('🤖 AI 智能评估', 90, 565);
        ctx.font = `26px system-ui`;
        ctx.fillStyle = '#1e293b';
        // 自动换行
        const wrapTextCanvas = (text, maxWidth, x, y, lineHeight, fontSize) => {
            ctx.font = `${fontSize}px system-ui`;
            let words = text.split('');
            let lines = [];
            let currentLine = '';
            for(let char of words) {
                let testLine = currentLine + char;
                let metrics = ctx.measureText(testLine);
                if(metrics.width > maxWidth && currentLine.length > 0) {
                    lines.push(currentLine);
                    currentLine = char;
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);
            for(let i=0; i<lines.length; i++) {
                ctx.fillText(lines[i], x, y + i * lineHeight);
            }
            return lines.length * lineHeight;
        };
        let aiStartY = 620;
        let used = wrapTextCanvas(shortAi, canvas.width-180, 90, aiStartY, 46, 26);
        
        // 建议标题
        let suggestionsY = aiStartY + used + 45;
        ctx.fillStyle = '#0f172a';
        ctx.font = `bold 32px system-ui`;
        ctx.fillText('📋 健康行动建议', 90, suggestionsY);
        ctx.font = `26px system-ui`;
        ctx.fillStyle = '#475569';
        let tipY = suggestionsY + 55;
        commonTips.forEach((tip, idx) => {
            ctx.fillText(`${idx+1}. ${tip}`, 110, tipY + idx*48);
        });
        
        // 底部网址
        ctx.font = `22px monospace`;
        ctx.fillStyle = '#6c757d';
        let urlShort = CURRENT_URL.length > 50 ? CURRENT_URL.substring(0, 47)+'...' : CURRENT_URL;
        ctx.fillText(urlShort, 90, canvas.height - 85);
        ctx.font = `20px system-ui`;
        ctx.fillStyle = '#aaa';
        ctx.fillText('扫描二维码或访问链接自测', 90, canvas.height - 45);
        
        // 装饰二维码示意块
        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(canvas.width-190, canvas.height-150, 130, 130);
        ctx.fillStyle = '#334155';
        ctx.font = `22px system-ui`;
        ctx.fillText('测一测', canvas.width-160, canvas.height-70);
        
        // 转为JPEG 高质量
        return canvas.toDataURL('image/jpeg', 0.92);
    }
    
    async function showPosterModal() {
        const jpegUrl = await generatePosterJPEG();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'poster-overlay';
        modalDiv.innerHTML = `
            <div class="poster-card">
                <span class="poster-close" onclick="this.closest('.poster-overlay').remove()">&times;</span>
                <div style="font-weight: bold; font-size: 18px; margin-bottom: 12px;">📸 评估报告图片</div>
                <img class="poster-img-preview" src="${jpegUrl}" alt="报告海报" />
                <button class="btn-download" id="downloadPosterJpegBtn">保存图片 (JPEG)</button>
                <div style="font-size: 11px; margin-top: 12px; color: #aaa;">长按或点击保存即可分享</div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const downloadBtn = document.getElementById('downloadPosterJpegBtn');
        if(downloadBtn) {
            downloadBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = 'cognitive_report.jpg';
                link.href = jpegUrl;
                link.click();
                showToast('报告图片已保存');
            });
        }
    }
    
    function renderQuiz() {
        const total = questions.length;
        const currentQNumber = currentIndex + 1;
        const progressPercent = ((currentIndex) / total) * 100;
        const question = questions[currentIndex];
        const selectedRaw = answers[currentIndex];
        let optionsHtml = '';
        for (let opt of optionItems) {
            const isSelected = (selectedRaw === opt.rawScore);
            optionsHtml += `<button class="option-btn ${isSelected ? 'selected' : ''}" onclick="selectAnswer(${opt.rawScore})">${opt.label}</button>`;
        }
        const prevDisabled = currentIndex === 0;
        return `
            <div class="card">
                <div class="quiz-header">
                    <div class="counter-wrapper">
                        <span class="question-counter">第 ${currentQNumber} / ${total} 题</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
                </div>
                <div class="question-text">${escapeHtml(question)}</div>
                <div class="options">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="nav-btn ${prevDisabled ? 'disabled' : ''}" onclick="prevQuestion()" ${prevDisabled ? 'disabled' : ''}>← 上一题</button>
                </div>
                <div class="footer-note">根据近3个月真实感受选择</div>
            </div>
        `;
    }
    
    function renderHome() {
        return `
            <div class="card">
                <h1>🧠 认知功能专业评估</h1>
                <div class="subtitle">20题自测 · 满分100分 · AI智能解读</div>
                <button class="btn btn-primary" onclick="startTest()">开始评估</button>
                <div class="footer-note">每题根据真实感受选择，可返回修改</div>
            </div>
        `;
    }
    
    function renderResult() {
        const percentScore = getPercentageScore();
        const rawScore = getTotalRawScore();
        const risk = getRiskLevel(percentScore);
        const aiAssessment = generateAIAssessment(percentScore, rawScore);
        const tipsHtml = commonTips.map(t => `<li>${t}</li>`).join('');
        return `
            <div class="card">
                <h1>📋 评估结果</h1>
                <div class="score-circle">
                    <div class="score-number">${percentScore}</div>
                    <div class="score-max">/ 100 分</div>
                </div>
                <div class="risk-level ${risk.class}">${risk.name}</div>
                <div class="ai-assessment">
                    <div class="ai-title"><span>🤖 AI 智能评估</span></div>
                    <div class="ai-text">${escapeHtml(aiAssessment)}</div>
                </div>
                <div class="result-desc">${risk.desc}</div>
                <div class="suggest-box">
                    <div class="suggest-title">💡 通用健康建议</div>
                    <ul class="suggest-list">${tipsHtml}</ul>
                </div>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="resetTest()">重新测试</button>
                    <button class="btn btn-share-link" onclick="shareUrl()">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" width="18" height="18"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1 0 1.71-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                        分享测评链接
                    </button>
                    <button class="btn btn-share-poster" onclick="showPosterModal()">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" width="18" height="18"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 8h-4v4h-4v-4H6V9h4V5h4v4h4v2z"/></svg>
                        生成报告图片
                    </button>
                </div>
                <div class="footer-note">满分100分，分数越高风险越高 | AI多维度分析</div>
            </div>
        `;
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function render() {
        const appDiv = document.getElementById('app');
        if (!appDiv) return;
        let html = '';
        if (currentPage === 'home') html = renderHome();
        else if (currentPage === 'quiz') html = renderQuiz();
        else if (currentPage === 'result') html = renderResult();
        appDiv.innerHTML = html;
    }
    
    window.selectAnswer = selectAnswer;
    window.prevQuestion = prevQuestion;
    window.resetTest = resetTest;
    window.startTest = startTest;
    window.shareUrl = shareUrl;
    window.showPosterModal = showPosterModal;
    render();
</script>
</body>
</html>
