<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>认知健康管理中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <h2 id="title">加载中...</h2>
        <div id="content"></div>
    </div>

    <script>
        // Supabase 配置（你的真实信息）
        const SUPABASE_URL = 'https://odztrbmvxnrqqqfywrym.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-YmD5UHc2TUtLpcR6KgTnw_kddcL5Lo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // 显示界面
        function render() {
            const title = document.getElementById('title');
            const content = document.getElementById('content');
            
            if (currentUser) {
                title.innerText = `✅ 已登录：${currentUser.email}`;
                content.innerHTML = `
                    <button onclick="logout()">退出登录</button>
                    <hr>
                    <h3>保存测试分数</h3>
                    <input type="number" id="score" placeholder="输入分数 0-100">
                    <button onclick="saveScore()">保存分数</button>
                    <button onclick="loadScore()">读取上次分数</button>
                    <p id="result"></p>
                `;
            } else {
                title.innerText = '📝 登录 / 注册';
                content.innerHTML = `
                    <input type="email" id="email" placeholder="邮箱"><br><br>
                    <input type="password" id="password" placeholder="密码（至少6位）"><br><br>
                    <button onclick="login()">登录</button>
                    <button onclick="register()">注册</button>
                    <p id="msg"></p>
                `;
            }
        }

        // 注册
        window.register = async function() {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signUp({ email, password: pwd });
            if (error) {
                document.getElementById('msg').innerText = '注册失败：' + error.message;
            } else {
                document.getElementById('msg').innerText = '注册成功！请查收验证邮件（如未收到，可稍后登录）';
            }
        };

        // 登录
        window.login = async function() {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd });
            if (error) {
                document.getElementById('msg').innerText = '登录失败：' + error.message;
            } else {
                currentUser = data.user;
                render();
            }
        };

        // 退出
        window.logout = async function() {
            await supabase.auth.signOut();
            currentUser = null;
            render();
        };

        // 保存分数到 profiles 表
        window.saveScore = async function() {
            const score = document.getElementById('score').value;
            if (!score) return;
            const { error } = await supabase
                .from('profiles')
                .upsert({ id: currentUser.id, email: currentUser.email, cognitive_score: parseInt(score) });
            if (error) {
                document.getElementById('result').innerText = '保存失败：' + error.message;
            } else {
                document.getElementById('result').innerText = '保存成功！';
            }
        };

        // 读取上次分数
        window.loadScore = async function() {
            const { data, error } = await supabase
                .from('profiles')
                .select('cognitive_score')
                .eq('id', currentUser.id)
                .single();
            if (error && error.code !== 'PGRST116') {
                document.getElementById('result').innerText = '读取失败：' + error.message;
            } else {
                const score = data?.cognitive_score || '暂无';
                document.getElementById('result').innerText = `上次评估分数：${score}`;
            }
        };

        // 检查是否已登录
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) currentUser = user;
            render();
        }
        
        checkUser();
    </script>
</body>
</html>
