<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>认知功能专业自测 - 健康评估</title>
    <html xmlns="http://www.w3.org/1999/xhtml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 28px 22px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }

        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 6px;
            color: #1e293b;
        }

        .subtitle {
            text-align: center;
            color: #5b6e8c;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #0f6e3f;
            color: white;
            box-shadow: 0 2px 6px rgba(15,110,63,0.2);
        }
        .btn-primary:active { background: #0a5833; transform: scale(0.97); }

        .btn-secondary {
            background: #475569;
            color: white;
        }
        .btn-secondary:active { background: #334155; transform: scale(0.97); }

        .btn-outline {
            background: white;
            color: #0f6e3f;
            border: 1.5px solid #0f6e3f;
            margin-top: 12px;
        }
        .btn-outline:active { background: #eef9f2; transform: scale(0.97); }

        .btn-share-link {
            background: #3b82f6;
            color: white;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share-link:active { background: #2563eb; transform: scale(0.97); }
        
        .btn-share-poster {
            background: #8b5cf6;
            color: white;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share-poster:active { background: #7c3aed; transform: scale(0.97); }
        
        .btn-icon-svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* 进度区域 */
        .quiz-header {
            margin-bottom: 24px;
        }
        .question-counter {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #0f6e3f;
            background: #e6f7ef;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-bottom: 12px;
            width: auto;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 12px 0 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #0f6e3f;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .question-text {
            font-weight: 700;
            font-size: 22px;
            color: #0f172a;
            margin: 24px 0 28px;
            line-height: 1.4;
            text-align: center;
            padding: 0 4px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option-btn {
            padding: 15px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            background: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #1e293b;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn .score-badge {
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }
        .option-btn.selected {
            background: #0f6e3f;
            border-color: #0f6e3f;
            color: white;
        }
        .option-btn.selected .score-badge {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        .option-btn:active { transform: scale(0.98); background: #f8fafc; }
        .option-btn.selected:active { background: #0a5833; }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .nav-btn {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 12px;
            border-radius: 44px;
            font-weight: 600;
            cursor: pointer;
            color: #334155;
        }
        .nav-btn:active { background: #e2e8f0; }

        /* 结果页 */
        .score-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #f1f5f9;
            margin: 10px auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .score-number {
            font-size: 42px;
            font-weight: 800;
            color: #0f172a;
        }
        .risk-level {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .risk-low { color: #10b981; }
        .risk-mid { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        .result-desc {
            background: #f8fafc;
            padding: 16px;
            border-radius: 24px;
            margin: 20px 0;
            line-height: 1.5;
            color: #1e293b;
        }
        .suggest-box {
            background: #eef2ff;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            border-left: 5px solid #3b82f6;
        }
        .suggest-title {
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .suggest-list {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .suggest-list li {
            margin-bottom: 6px;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 2000;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .footer-note {
            font-size: 11px;
            text-align: center;
            color: #94a3b8;
            margin-top: 16px;
        }

        /* 海报遮罩 */
        .poster-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }
        .poster-card {
            background: white;
            border-radius: 32px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            position: relative;
        }
        .poster-close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }
        .poster-qr {
            margin: 16px auto;
            width: 140px;
            height: 140px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            font-size: 12px;
            color: #475569;
        }
        .btn-download {
            background: #0f6e3f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            margin-top: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ---------- 20题问卷内容 ----------
    const questions = [
        "最近是否经常忘记刚说过的话？",
        "是否常忘记东西放在哪里？",
        "是否重复询问同一件事？",
        "是否忘记约定或日期？",
        "是否记不住最近发生的事？",
        "是否常搞不清今天星期几？",
        "是否分不清月份或季节？",
        "是否去熟悉地方也容易迷路？",
        "是否常叫不出熟悉物品名称？",
        "说话时是否常卡住找词？",
        "是否表达内容混乱？",
        "是否听不懂复杂说明？",
        "是否不会使用熟悉家电？",
        "是否缴费、算账变困难？",
        "是否做饭步骤容易混乱？",
        "是否需要别人提醒洗澡吃药？",
        "是否脾气变化明显？",
        "是否变得多疑敏感？",
        "是否兴趣明显下降？",
        "是否社交意愿下降？"
    ];
    
    const optionScores = [
        { label: "无异常", value: 0 },
        { label: "偶尔出现", value: 1 },
        { label: "经常出现", value: 2 },
        { label: "明显频繁", value: 3 }
    ];
    
    let currentPage = 'home'; // home, quiz, result
    let currentIndex = 0;
    let answers = new Array(20).fill(null);
    
    // 总分 & 风险
    function getTotalScore() {
        let sum = 0;
        for (let i = 0; i < answers.length; i++) {
            if (answers[i] !== null) sum += answers[i];
        }
        return sum;
    }
    
    function getRiskLevel(score) {
        if (score <= 15) return { name: '低风险', class: 'risk-low', desc: '当前认知状态总体稳定，建议持续保持健康生活习惯。' };
        if (score <= 30) return { name: '中风险', class: 'risk-mid', desc: '存在一定认知下降倾向，建议增加观察，并进行专业筛查。' };
        return { name: '高风险', class: 'risk-high', desc: '认知下降风险较高，建议尽快前往医院神经内科或记忆门诊进一步评估。' };
    }
    
    // 统一建议列表
    const commonTips = [
        "🏃 每周运动3次以上",
        "😴 保持规律睡眠",
        "❤️ 控制血压血糖血脂",
        "👥 多社交、多交流",
        "📚 每日阅读或记忆训练",
        "🏥 若持续加重请及时就医"
    ];
    
    // 当前页面URL
    const CURRENT_URL = window.location.href;
    
    // 显示toast
    function showToast(msg, duration = 2000) {
        let toast = document.getElementById('global-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'global-toast';
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }
    
    // 分享链接 (纯URL)
    async function shareUrl() {
        if (navigator.share && /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            try {
                await navigator.share({
                    title: '认知功能自测',
                    text: '测一下认知健康状态',
                    url: CURRENT_URL,
                });
                showToast('分享成功 ✓');
                return;
            } catch(e) { if(e.name !== 'AbortError') fallbackCopyUrl(); }
        } else {
            fallbackCopyUrl();
        }
    }
    async function fallbackCopyUrl() {
        try {
            await navigator.clipboard.writeText(CURRENT_URL);
            showToast('🔗 链接已复制，可分享给好友');
        } catch(e) {
            let ta = document.createElement('textarea');
            ta.value = CURRENT_URL;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('🔗 链接已复制');
        }
    }
    
    // 生成海报 (简单版模拟截图样式，使用html2canvas需要额外库？纯前端简易实现canvas生成图片)
    // 为了满足可选海报功能，我们用html2canvas？为了稳定且不依赖外部，采用动态生成canvas绘制简单风格海报。为了高兼容，不使用外部库，手动绘制canvas海报。
    async function generatePoster() {
        const score = getTotalScore();
        const level = getRiskLevel(score);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 700;
        // 背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // 标题装饰
        ctx.fillStyle = '#0f6e3f';
        ctx.fillRect(0, 0, canvas.width, 12);
        ctx.font = 'bold 26px "PingFang SC", "Segoe UI"';
        ctx.fillStyle = '#1e293b';
        ctx.fillText('认知功能自测报告', 40, 70);
        ctx.font = '16px system-ui';
        ctx.fillStyle = '#5b6e8c';
        ctx.fillText('健康评估·早期关注', 40, 110);
        
        // 分数圆
        ctx.beginPath();
        ctx.arc(250, 190, 55, 0, 2 * Math.PI);
        ctx.fillStyle = '#f1f5f9';
        ctx.fill();
        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 44px monospace';
        ctx.fillText(score, 210, 208);
        ctx.font = 'bold 18px system-ui';
        ctx.fillStyle = level.class === 'risk-low' ? '#10b981' : (level.class === 'risk-mid' ? '#f59e0b' : '#ef4444');
        ctx.fillText(level.name, 205, 250);
        
        // 描述
        ctx.font = '15px system-ui';
        ctx.fillStyle = '#334155';
        ctx.fillText(level.desc.substring(0, 28)+'...', 50, 290);
        
        // 建议标题
        ctx.fillStyle = '#0f172a';
        ctx.font = 'bold 18px system-ui';
        ctx.fillText('📋 健康建议', 40, 340);
        ctx.font = '14px system-ui';
        ctx.fillStyle = '#475569';
        let tipsY = 375;
        commonTips.forEach((tip, idx) => {
            ctx.fillText(`${idx+1}. ${tip}`, 45, tipsY + idx*26);
        });
        
        // 底部网址
        ctx.font = '12px monospace';
        ctx.fillStyle = '#6c757d';
        let urlShort = CURRENT_URL.length > 40 ? CURRENT_URL.substring(0, 38)+'...' : CURRENT_URL;
        ctx.fillText(urlShort, 45, 630);
        ctx.fillStyle = '#aaa';
        ctx.fillText('扫码或访问链接自测', 45, 660);
        
        // 模拟二维码文字块
        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(380, 590, 80, 80);
        ctx.fillStyle = '#334155';
        ctx.font = '12px system-ui';
        ctx.fillText('测一测', 410, 635);
        
        return canvas.toDataURL('image/png');
    }
    
    async function showPosterModal() {
        const imageData = await generatePoster();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'poster-overlay';
        modalDiv.innerHTML = `
            <div class="poster-card">
                <span class="poster-close" onclick="this.closest('.poster-overlay').remove()">&times;</span>
                <div style="font-weight:bold; margin-bottom:8px;">📸 结果分享海报</div>
                <img id="posterImg" src="${imageData}" style="width:100%; border-radius:20px; margin: 8px 0;" />
                <button class="btn-download" id="downloadPosterBtn">保存图片 / 分享</button>
                <div style="font-size:11px; margin-top:10px; color:#aaa;">长按或保存图片即可分享</div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('downloadPosterBtn')?.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'cognitive_report.png';
            link.href = imageData;
            link.click();
            showToast('海报已保存');
        });
    }
    
    // 问卷逻辑：选择答案
    function selectAnswer(scoreVal) {
        if (currentPage !== 'quiz') return;
        answers[currentIndex] = scoreVal;
        // 自动跳下一题
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            render();
        } else {
            // 最后已完成所有题
            currentPage = 'result';
            render();
        }
    }
    
    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            render();
        }
    }
    function resetTest() {
        answers = new Array(20).fill(null);
        currentIndex = 0;
        currentPage = 'home';
        render();
    }
    function startTest() {
        answers = new Array(20).fill(null);
        currentIndex = 0;
        currentPage = 'quiz';
        render();
    }
    
    // 渲染各页面
    function renderHome() {
        return `
            <div class="card">
                <h1>🧠 认知功能专业评估</h1>
                <div class="subtitle">20题自测 · 关注脑健康</div>
                <button class="btn btn-primary" onclick="startTest()">开始评估</button>
                <div class="footer-note">每题请根据近3个月真实感受选择</div>
            </div>
        `;
    }
    
    function renderQuiz() {
        const total = questions.length;
        const currentQNumber = currentIndex + 1;
        const progressPercent = ((currentIndex) / total) * 100;
        const question = questions[currentIndex];
        const selectedVal = answers[currentIndex];
        
        let optionsHtml = '';
        for (let opt of optionScores) {
            const isSelected = (selectedVal === opt.value);
            optionsHtml += `
                <button class="option-btn ${isSelected ? 'selected' : ''}" onclick="selectAnswer(${opt.value})">
                    <span>${opt.label}</span>
                    <span class="score-badge">${opt.value}分</span>
                </button>
            `;
        }
        
        const prevDisabled = currentIndex === 0 ? 'disabled style="opacity:0.5;"' : '';
        return `
            <div class="card">
                <div class="quiz-header">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <span class="question-counter">第 ${currentQNumber} / ${total} 题</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                    </div>
                </div>
                <div class="question-text">${escapeHtml(question)}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="prevQuestion()" ${prevDisabled}>← 上一题</button>
                </div>
                <div class="footer-note" style="margin-top:20px;">请选择最符合的选项（单选）</div>
            </div>
        `;
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function renderResult() {
        const score = getTotalScore();
        const risk = getRiskLevel(score);
        const tipsHtml = commonTips.map(t => `<li>${t}</li>`).join('');
        return `
            <div class="card">
                <h1>📋 评估结果</h1>
                <div class="score-circle">
                    <div class="score-number">${score}</div>
                    <div style="font-size:12px; color:#64748b;">总分 (0-60)</div>
                </div>
                <div class="risk-level ${risk.class}">${risk.name}</div>
                <div class="result-desc">${risk.desc}</div>
                
                <div class="suggest-box">
                    <div class="suggest-title">💡 通用健康建议</div>
                    <ul class="suggest-list">${tipsHtml}</ul>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="resetTest()">重新测试</button>
                    <button class="btn btn-share-link" onclick="shareUrl()">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" width="18" height="18"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1 0 1.71-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                        分享测评链接
                    </button>
                    <button class="btn btn-share-poster" onclick="showPosterModal()">
                        <svg class="btn-icon-svg" viewBox="0 0 24 24" width="18" height="18"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 8h-4v4h-4v-4H6V9h4V5h4v4h4v2z"/></svg>
                        生成分享海报
                    </button>
                </div>
                <div class="footer-note">自测结果仅供参考，请遵专业医师诊断</div>
            </div>
        `;
    }
    
    function render() {
        const app = document.getElementById('app');
        if (!app) return;
        let html = '';
        if (currentPage === 'home') html = renderHome();
        else if (currentPage === 'quiz') html = renderQuiz();
        else if (currentPage === 'result') html = renderResult();
        app.innerHTML = html;
    }
    
    // 全局函数挂载
    window.selectAnswer = selectAnswer;
    window.prevQuestion = prevQuestion;
    window.resetTest = resetTest;
    window.startTest = startTest;
    window.shareUrl = shareUrl;
    window.showPosterModal = showPosterModal;
    
    render();
</script>
</body>
</html>
