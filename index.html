<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>认知健康管理中心 | 专业自测+智能方案</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f7fc; color: #1e293b; min-height: 100vh; }
        .app-wrapper { max-width: 500px; margin: 0 auto; background: #f4f7fc; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        .main-content { flex: 1; padding-bottom: 85px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.94); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px 20px 28px; border-top: 0.5px solid rgba(0,0,0,0.08); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 6px 14px; border-radius: 40px; opacity: 0.55; color: #5b6e8c; }
        .nav-item.active { opacity: 1; color: #0f6e3f; background: rgba(15,110,63,0.08); }
        .nav-icon { width: 26px; height: 26px; fill: currentColor; }
        .nav-label { font-size: 11px; font-weight: 500; }
        .card { background: white; border-radius: 36px; padding: 24px 22px; margin: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.02); }
        .hero-card { background: linear-gradient(135deg, #f0f9f3 0%, #ffffff 100%); border-radius: 44px; margin: 20px 16px; padding: 32px 26px; border: 0.5px solid rgba(15,110,63,0.2); }
        .hero-tag { font-size: 13px; color: #0f6e3f; font-weight: 600; background: rgba(15,110,63,0.12); display: inline-block; padding: 6px 14px; border-radius: 40px; margin-bottom: 20px; }
        .hero-title { font-size: 38px; font-weight: 800; line-height: 1.15; margin-bottom: 14px; color: #1a2c3e; }
        .hero-sub { font-size: 18px; font-weight: 500; color: #2c5a7a; margin-bottom: 32px; border-left: 4px solid #0f6e3f; padding-left: 14px; }
        .btn-primary { background: #0f6e3f; color: white; width: 100%; padding: 18px 16px; font-size: 17px; font-weight: 700; border-radius: 60px; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(15,110,63,0.28); }
        .btn-primary:active { background: #0a5833; transform: scale(0.97);}
        .btn-outline { background: white; border: 1.5px solid #0f6e3f; color: #0f6e3f; font-weight: 600; padding: 14px 18px; border-radius: 60px; width: 100%; cursor: pointer; font-size: 15px; }
        .btn-secondary { background: #eef2f7; color: #1e293b; font-weight: 600; padding: 12px 18px; border-radius: 40px; width: 100%; cursor: pointer; font-size: 14px; border: none; margin-top: 12px; }
        .device-showcase { background: linear-gradient(110deg, #ffffff 0%, #f8fdf9 100%); border-radius: 36px; margin: 16px; padding: 24px 22px; border: 0.5px solid #dde9e2; }
        .device-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .device-title { font-size: 22px; font-weight: 720; display: flex; align-items: center; gap: 10px; }
        .device-desc { font-size: 15px; color: #3c6485; margin: 16px 0; line-height: 1.4; }
        .btn-small { background: rgba(15,110,63,0.1); border: 1px solid #0f6e3f; padding: 10px 20px; border-radius: 40px; font-size: 14px; font-weight: 600; color: #0f6e3f; cursor: pointer; }
        .quiz-card { background: white; border-radius: 40px; margin: 20px 16px; padding: 28px 22px; }
        .question-text { font-weight: 720; font-size: 24px; margin: 20px 0 32px; text-align: center; line-height: 1.35; }
        .option-btn { padding: 16px; border: 1.5px solid #e2e8f0; border-radius: 60px; background: white; font-size: 16px; font-weight: 510; margin-bottom: 12px; width: 100%; text-align: center; cursor: pointer; }
        .option-btn.selected { background: #0f6e3f; border-color: #0f6e3f; color: white; }
        .progress-bar { background: #eef2f7; border-radius: 20px; height: 7px; margin: 10px 0 12px; }
        .progress-fill { background: #0f6e3f; height: 7px; border-radius: 20px; width: 0%; }
        .score-circle { width: 130px; height: 130px; background: #eef5ff; border-radius: 50%; margin: 12px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .risk-low { color: #10b981; }
        .risk-mid { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        .risk-level { font-size: 28px; font-weight: 800; margin: 12px 0; }
        .ai-assessment { background: #f0f5fe; padding: 18px; border-radius: 28px; margin: 20px 0 0 0; font-size: 15px; }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e2b3c; color: white; padding: 10px 20px; border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.18s; pointer-events: none; z-index: 2000; }
        .share-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn-share { flex: 1; background: #0f6e3f; color: white; border: none; border-radius: 60px; padding: 12px; font-weight: 600; cursor: pointer; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-input, .profile-input, .profile-select { padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 60px; font-size: 16px; width: 100%; background: white; }
        .auth-switch { text-align: center; margin-top: 16px; color: #0f6e3f; cursor: pointer; }
        .footer-links { text-align: center; font-size: 12px; color: #7a98b5; padding: 24px 16px 32px; border-top: 0.5px solid #e6edf4; margin-top: 20px; }
        .faq-item { border-bottom: 1px solid #edf2f7; padding: 18px 0; }
        .faq-question { font-weight: 680; display: flex; justify-content: space-between; cursor: pointer; font-size: 17px; }
        .faq-answer { font-size: 15px; color: #557da5; padding-top: 12px; display: none; }
        .faq-answer.show { display: block; }
        .history-item { background: #f8fafc; border-radius: 20px; padding: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .history-score { font-size: 24px; font-weight: 800; color: #0f6e3f; }
        .history-date { font-size: 12px; color: #94a3b8; }
        .edit-icon { background: none; border: none; font-size: 18px; cursor: pointer; padding: 6px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef2f7; }
        .info-label { font-weight: 600; color: #475569; }
        .info-value { color: #1e293b; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="main-content" id="mainContent"></div>
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" data-tab="home"><svg class="nav-icon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M12 3L2 9l10 6 10-6-10-6zM2 18l10 6 10-6M2 12l10 6 10-6"/></svg><span class="nav-label">认知评估</span></div>
        <div class="nav-item" data-tab="device"><svg class="nav-icon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 2h6v2h-6V6zm0 4h6v2h-6v-2zm-6 0h4v2H6v-2zm0 4h4v2H6v-2zm10 0h2v2h-2v-2zm-6 0h4v2h-4v-2z"/></svg><span class="nav-label">智能设备</span></div>
        <div class="nav-item" data-tab="profile"><svg class="nav-icon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span class="nav-label">我的页面</span></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    (function() {
        // Supabase 配置
        const SUPABASE_URL = 'https://odztrbmvxnrqqqfywrym.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-YmD5UHc2TUtLpcR6KgTnw_kddcL5Lo';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 全局状态
        let _currentUser = null;
        let _currentTab = "home";
        let _quizActive = false;
        let _answers = new Array(20).fill(null);
        let _currentIndex = 0;
        let _authMode = "login";
        let _isEditing = false;
        let _userProfile = { gender: '', age: null };
        
        // 问卷数据
        const QUESTIONS = [
            "最近是否经常忘记刚说过的话？", "是否常忘记东西放在哪里？", "是否重复询问同一件事？",
            "是否忘记约定或日期？", "是否记不住最近发生的事？", "是否常搞不清今天星期几？",
            "是否分不清月份或季节？", "是否去熟悉地方也容易迷路？", "是否常叫不出熟悉物品名称？",
            "说话时是否常卡住找词？", "是否表达内容混乱？", "是否听不懂复杂说明？",
            "是否不会使用熟悉家电？", "是否缴费、算账变困难？", "是否做饭步骤容易混乱？",
            "是否需要别人提醒洗澡吃药？", "是否脾气变化明显？", "是否变得多疑敏感？",
            "是否兴趣明显下降？", "是否社交意愿下降？"
        ];
        const OPTIONS = [
            { label: "无异常", rawScore: 0 },
            { label: "偶尔出现", rawScore: 1 },
            { label: "经常出现", rawScore: 2 },
            { label: "明显频繁", rawScore: 3 }
        ];
        const MAX_RAW = 60;
        const SHARE_URL = "https://www.renzhiceshi.online/";
        
        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            if (!toast) return;
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2200);
        }
        
        function getTotalRaw() {
            let sum = 0;
            for(let v of _answers) if(v !== null) sum += v;
            return sum;
        }
        function getPercentScore() {
            return Math.round((getTotalRaw() / MAX_RAW) * 100);
        }
        function getRiskLevel(score) {
            if(score <= 25) return { name:'低风险', class:'risk-low', desc:'当前认知状态总体稳定，保持健康生活习惯即可。' };
            if(score <= 50) return { name:'中风险', class:'risk-mid', desc:'存在一定认知下降倾向，建议加强脑力活动并定期复查。' };
            return { name:'高风险', class:'risk-high', desc:'认知功能需引起关注，建议加强日常监测。' };
        }
        function getRiskText(score) {
            if(score <= 25) return '低风险';
            if(score <= 50) return '中风险';
            return '高风险';
        }
        function generateAI(percent) {
            if(percent <= 25) return "🤖 AI分析：您的认知功能整体表现良好，记忆与执行能力未见明显异常。";
            if(percent <= 50) return "🤖 AI提示：存在轻度认知功能波动，尤其是在近期记忆或定向方面。";
            return "🤖 AI预警：认知功能下降风险显著，多个维度出现异常信号。";
        }
        
        // 数据库操作
        async function loadUserProfile() {
            if (!_currentUser) return;
            try {
                const { data } = await _supabase.from('profiles').select('gender, age').eq('id', _currentUser.id).single();
                if (data) {
                    _userProfile.gender = data.gender || '';
                    _userProfile.age = data.age || null;
                }
            } catch(e) { console.error(e); }
        }
        
        async function updateUserProfile(gender, age) {
            if (!_currentUser) return;
            try {
                await _supabase.from('profiles').upsert({ 
                    id: _currentUser.id, 
                    email: _currentUser.email,
                    gender: gender,
                    age: age ? parseInt(age) : null
                });
                _userProfile.gender = gender;
                _userProfile.age = age;
                showToast("资料已更新");
                render();
            } catch(e) { showToast("更新失败"); }
        }
        
        async function saveScoreToSupabase(score) {
            if (!_currentUser) return;
            const riskText = getRiskText(score);
            try {
                await _supabase.from('profiles').upsert({ 
                    id: _currentUser.id, 
                    email: _currentUser.email, 
                    cognitive_score: score,
                    updated_at: new Date().toISOString()
                });
                await _supabase.from('assessment_history').insert({
                    user_id: _currentUser.id,
                    score: score,
                    risk_level: riskText
                });
            } catch(e) { console.error(e); }
        }
        
        async function loadUserScore() {
            if (!_currentUser) return null;
            try {
                const { data } = await _supabase.from('profiles').select('cognitive_score').eq('id', _currentUser.id).single();
                return data?.cognitive_score || null;
            } catch(e) { return null; }
        }
        
        async function loadAssessmentHistory() {
            if (!_currentUser) return [];
            try {
                const { data } = await _supabase.from('assessment_history')
                    .select('score, risk_level, created_at')
                    .eq('user_id', _currentUser.id)
                    .order('created_at', { ascending: false });
                return data || [];
            } catch(e) { return []; }
        }
        
        // 页面渲染
        function renderAuth() {
            return `<div class="card" style="margin-top:40px;"><h2 style="text-align:center; margin-bottom:28px;">${_authMode === 'login' ? '登录' : '注册'}</h2>
            <div class="auth-form"><input type="email" id="authEmail" class="auth-input" placeholder="邮箱"><input type="password" id="authPassword" class="auth-input" placeholder="密码（至少6位）"><button class="btn-primary" id="authSubmitBtn">${_authMode === 'login' ? '登录' : '注册'}</button></div>
            <div class="auth-switch" id="authSwitchBtn">${_authMode === 'login' ? '没有账号？点击注册' : '已有账号？点击登录'}</div></div>`;
        }
        
        function renderHome() {
            const loginStatus = _currentUser ? 
                `<div style="background:#eef6f1; border-radius:30px; padding:12px 20px; margin-bottom:16px; text-align:center;">👋 欢迎回来，${_currentUser.email}<button id="logoutHomeBtn" style="margin-left:12px; background:none; border:1px solid #0f6e3f; border-radius:20px; padding:4px 12px; cursor:pointer;">退出</button></div>` : 
                `<div style="background:#eef6f1; border-radius:30px; padding:12px 20px; margin-bottom:16px; text-align:center;">👤 未登录 · <span id="gotoAuthBtn" style="color:#0f6e3f; font-weight:600; cursor:pointer;">点击登录/注册</span></div>`;
            return `${loginStatus}<div class="hero-card"><div class="hero-tag">🧠 官方推荐 · 居家智能监测</div><div class="hero-title">父母最近<br>总忘事？</div><div class="hero-sub">3分钟认知健康评估<br>+居家智能监测方案</div><button class="btn-primary" id="startFreeEvalBtn">立即免费评估 →</button></div>
            <div class="device-showcase"><div class="device-header"><div class="device-title"><span>⌚ 华为手环</span></div><button class="btn-small" id="gotoDeviceFromHome">点击查看 →</button></div><div class="device-desc">🏠 专业认知辅助 · 无感监测长者睡眠与日常活动轨迹，异常行为及时提醒。</div></div>`;
        }
        
        function renderDevice() {
            return `<div class="card" style="margin-top:20px;"><div style="display:flex; align-items:center; gap:14px;"><span style="font-size:48px;">⌚</span><h2>华为手环</h2></div><p style="color:#2b6e4e; margin:20px 0;">专为认知健康及长者安全设计的智能可穿戴设备</p>
            <div style="background:#f0f9f4; border-radius:32px; padding:24px;"><div style="font-weight:800; font-size:20px;">🎯 核心认知守护功能</div>
            <ul style="margin-left:20px; margin-top:16px;"><li><strong>💤 睡眠监测</strong> – 分析睡眠规律与认知健康关联性</li><li><strong>🚶 活动轨迹异常提醒</strong> – 识别久坐、夜间离床等行为</li></ul>
            <button class="btn-primary" id="deviceContactBtn" style="margin-top:20px;">查看详情 →</button></div></div>`;
        }
        
        async function renderProfile() {
            if (!_currentUser) return renderAuth();
            
            await loadUserProfile();
            const latestScore = await loadUserScore();
            const historyList = await loadAssessmentHistory();
            
            let historyHtml = '<h3 style="margin-bottom:16px;">📊 历史评估报告</h3>';
            if (historyList.length === 0) {
                historyHtml += '<p style="color:#94a3b8; text-align:center; padding:20px;">暂无评估记录，去做一次测试吧~</p>';
            } else {
                for (let item of historyList) {
                    const date = new Date(item.created_at);
                    const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
                    historyHtml += `
                        <div class="history-item">
                            <div>
                                <div class="history-score">${item.score} 分</div>
                                <div class="history-date">${dateStr}</div>
                            </div>
                            <div style="color:${item.score<=25?'#10b981':item.score<=50?'#f59e0b':'#ef4444'}; font-weight:600;">${item.risk_level}</div>
                        </div>
                    `;
                }
            }
            
            if (_isEditing) {
                return `<div class="card" style="margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3>编辑个人资料</h3>
                        <button class="edit-icon" id="cancelEditBtn">✖️</button>
                    </div>
                    <div class="auth-form">
                        <input type="text" id="editGender" class="profile-input" placeholder="性别（男/女）" value="${_userProfile.gender || ''}">
                        <input type="number" id="editAge" class="profile-input" placeholder="年龄" value="${_userProfile.age || ''}">
                        <button class="btn-primary" id="saveProfileBtn">保存修改</button>
                    </div>
                </div>
                <div class="card">
                    <h3>📊 历史评估报告</h3>
                    ${historyHtml}
                    <button class="btn-outline" id="historyTestBtn" style="margin-top:16px;">📋 开始新评估</button>
                </div>
                <div class="footer-links"><a href="#">免责声明</a> | <a href="#">隐私政策</a> | <a href="mailto:celia2206254@gmail.com">联系方式</a></div>`;
            }
            
            return `<div class="card" style="margin-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div><h3>我的健康档案</h3><p style="color:#94a3b8; font-size:14px;">${_currentUser.email}</p></div>
                    <div><button id="logoutProfileBtn" style="background:#f0f0f0; border:none; border-radius:30px; padding:8px 16px; margin-right:8px;">退出</button><button id="editProfileBtn" class="edit-icon" style="background:#eef2f7; border-radius:30px; padding:8px 16px;">✏️ 编辑</button></div>
                </div>
                <div class="info-row"><span class="info-label">性别</span><span class="info-value">${_userProfile.gender || '未设置'}</span></div>
                <div class="info-row"><span class="info-label">年龄</span><span class="info-value">${_userProfile.age || '未设置'}</span></div>
                <div class="info-row"><span class="info-label">最近评估分数</span><span class="info-value" style="font-weight:800; color:#0f6e3f;">${latestScore !== null ? latestScore + ' 分' : '暂无'}</span></div>
            </div>
            <div class="card">
                <h3>📊 历史评估报告</h3>
                ${historyHtml}
                <button class="btn-outline" id="historyTestBtn" style="margin-top:16px;">📋 开始新评估</button>
            </div>
            <div class="card"><h3>❓ 常见问题</h3>
                <div class="faq-item"><div class="faq-question">问卷准吗？<span>▼</span></div><div class="faq-answer">可作为家庭自测参考，不能替代医院诊断。</div></div>
                <div class="faq-item"><div class="faq-question">数据安全吗？<span>▼</span></div><div class="faq-answer">您的数据经过加密存储，只有您自己可以查看。</div></div>
            </div>
            <div class="footer-links"><a href="#">免责声明</a> | <a href="#">隐私政策</a> | <a href="mailto:celia2206254@gmail.com">联系方式</a></div>`;
        }
        
        function renderQuiz() {
            const progress = (_currentIndex / QUESTIONS.length) * 100;
            let optsHtml = '';
            for(let opt of OPTIONS) {
                const isSelected = (_answers[_currentIndex] === opt.rawScore);
                optsHtml += `<button class="option-btn ${isSelected ? 'selected' : ''}" onclick="window.selectAnswer(${opt.rawScore})">${opt.label}</button>`;
            }
            return `<div class="quiz-card"><div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div><div class="question-text">${QUESTIONS[_currentIndex]}</div>${optsHtml}<button class="btn-outline" id="quizPrevBtn" style="${_currentIndex===0?'opacity:0.5':''}" ${_currentIndex===0?'disabled':''}>← 上一题</button></div>`;
        }
        
        function renderResult() {
            const percent = getPercentScore();
            const risk = getRiskLevel(percent);
