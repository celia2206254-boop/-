<script>
(function() {

    function getTotalRaw() { let s=0; for(let v of answers) if(v!==null) s+=v; return s; }
    function getPercentScore() { return Math.round((getTotalRaw()/MAX_RAW)*100); }
    function getRiskLevel(s) { 
        if(s<=25) return {name:'低风险',class:'risk-low',desc:'当前认知状态总体稳定，保持健康生活习惯即可。'}; 
        if(s<=50) return {name:'中风险',class:'risk-mid',desc:'存在一定认知下降倾向，建议加强脑力活动并定期复查。'}; 
        return {name:'高风险',class:'risk-high',desc:'认知功能需引起关注，建议加强日常监测。'}; 
    }
    
    function getAIDetail(score, userAge, userGender) {
        let ageText = '';
        if(userAge) {
            if(userAge < 50) ageText = `，您年龄${userAge}岁，处于认知功能相对稳定的阶段`;
            else if(userAge < 70) ageText = `，您年龄${userAge}岁，属于认知功能需要关注的人群`;

        }
        let genderText = userGender === '男' ? '男性' : (userGender === '女' ? '女性' : '');
        if(genderText) genderText = `，${genderText}`;
        
        if(score <= 25) {
            return `根据您的评估结果（${score}分），认知功能整体表现良好。${ageText}${genderText}。建议保持规律作息、适度运动和社交活动，继续维持健康的生活方式。每半年可进行一次跟踪评估。`;
        } else if(score <= 50) {
            return `根据您的评估结果（${score}分），存在轻度认知功能波动。${ageText}${genderText}。建议：1）增加脑力活动，如阅读、数独、记忆训练；2）保持每日30分钟有氧运动；3）保证充足睡眠；4）定期进行认知健康监测。建议3个月后复查。`;
        } else {
            return `根据您的评估结果（${score}分），认知功能下降风险较高。${ageText}${genderText}。强烈建议：1）尽快咨询专业医生进行评估；2）进行全面的认知功能检查；3）加强日常认知训练；4）建议家人关注日常生活状态。建议1-2个月后复查。`;
        }
    }
    
    function getRiskText(s) { if(s<=25) return '低风险'; if(s<=50) return '中风险'; return '高风险'; }
    function formatDateTime(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

    async function loadUserProfile() { if(!currentUser) return; try { const {data} = await supabase.from('profiles').select('gender,age').eq('id',currentUser.id).single(); if(data){ userProfile.gender = data.gender||''; userProfile.age = data.age||null; } } catch(e){} }
    async function updateUserProfile(g,a) { if(!currentUser) return; await supabase.from('profiles').upsert({id:currentUser.id,email:currentUser.email,gender:g,age:a?parseInt(a):null}); userProfile.gender=g; userProfile.age=a; showToast("资料已更新"); render(); }
    async function saveScoreToSupabase(score) { if(!currentUser) return; await supabase.from('profiles').upsert({id:currentUser.id,email:currentUser.email,cognitive_score:score}); await supabase.from('assessment_history').insert({user_id:currentUser.id,score:score,risk_level:getRiskText(score)}); }
    async function loadUserScore() { if(!currentUser) return null; try { const {data} = await supabase.from('profiles').select('cognitive_score').eq('id',currentUser.id).single(); return data?.cognitive_score||null; } catch(e){ return null; } }
    async function loadHistory() { if(!currentUser) return []; try { const {data} = await supabase.from('assessment_history').select('id,score,risk_level,created_at').eq('user_id',currentUser.id).order('created_at',{ascending:false}); return data||[]; } catch(e){ return []; } }

    function startBannerLoop() { 
        if(bannerInterval) clearInterval(bannerInterval); 
        bannerInterval = setInterval(()=>{ 
            let s = document.querySelector('.banner-slider'), d = document.querySelectorAll('.dot'); 
            if(s && d.length){ 
                currentBannerIndex = (currentBannerIndex + 1) % 2;
                s.style.transform = 'translateX(-' + (currentBannerIndex * 100) + '%)'; 
                d.forEach((dot,i)=>{ 
                    if(i === currentBannerIndex) dot.classList.add('active'); 
                    else dot.classList.remove('active'); 
                }); 
            } 
        }, 4000); 
    }

            '<div class="banner-item"><img src="https://raw.githubusercontent.com/celia2206254-boop/-/main/banner2.jpg" alt="banner2" style="width:100%; height:auto; display:block;"></div>' +
            '</div><div class="banner-dots"><span class="dot active"></span><span class="dot"></span></div></div>';
        
        return loginHint + bannerHtml + '<div class="device-card"><div class="device-header"><div class="device-title"><span>⌚</span> 华为手环</div><button class="btn-outline" id="gotoDeviceBtn" style="width:auto;padding:8px 20px;">查看详情</button></div><div class="device-desc">🏠 专业认知辅助 · 无感监测长者睡眠与日常活动轨迹，异常行为及时提醒。</div><div style="display:flex;gap:10px;margin-top:12px;"><span class="feature-badge">💤 睡眠监测</span><span class="feature-badge">🚶 活动轨迹异常提醒</span></div></div>';
    }

    function renderDevice() { return '<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><span style="font-size:42px;">⌚</span><h2 style="font-size:24px;">华为手环</h2></div><p style="color:#2b6e4e;margin-bottom:20px;font-weight:500;">专为认知健康及长者安全设计的智能可穿戴设备</p><div style="background:#f0f9f4;border-radius:24px;padding:20px;"><div style="font-weight:700;font-size:18px;margin-bottom:16px;">🎯 核心认知守护功能</div><ul style="margin-left:20px;"><li style="margin-bottom:10px;"><strong>💤 睡眠监测</strong> – 分析睡眠规律与认知健康关联性</li><li style="margin-bottom:10px;"><strong>🚶 活动轨迹异常提醒</strong> – 识别久坐、夜间离床等行为</li><li><strong>📅 认知健康周报</strong> – 生成认知趋势分析</li></ul><button class="btn-primary" id="deviceContactBtn" style="margin-top:24px;">📧 咨询详情</button></div></div>'; }

    async function renderProfile() {
        if(!currentUser) return '<div class="card"><h2 style="text-align:center;margin-bottom:24px;">'+(authMode==='login'?'登录':'注册')+'</h2><div class="auth-form"><input type="email" id="authEmail" class="auth-input" placeholder="邮箱"><input type="password" id="authPassword" class="auth-input" placeholder="密码（至少6位）"><button class="btn-primary" id="authSubmitBtn">'+(authMode==='login'?'登录':'注册')+'</button></div><div class="auth-switch" id="authSwitchBtn">'+(authMode==='login'?'没有账号？点击注册':'已有账号？点击登录')+'</div><div class="footer-links" style="margin-top:24px;"><a href="mailto:'+CONTACT_EMAIL+'">📧 联系客服</a></div></div>';
        
        await loadUserProfile();
        let latestScore = await loadUserScore();
        let historyList = await loadHistory();
        
        let displayList = showAllHistory ? historyList : historyList.slice(0, 3);
        let historyHtml = '<div class="flex-between" style="margin-bottom:16px;"><h3>📊 历史评估报告</h3><span style="font-size:13px; color:#64748b;">共 ' + historyList.length + ' 条记录</span></div>';
        
        if(historyList.length === 0) {
            historyHtml += '<div class="text-center" style="color:#94a3b8;padding:24px;">暂无评估记录，去做一次测试吧~</div>';
        } else {
            for(let h of displayList) { 
                let d = new Date(h.created_at); 
                let dateStr = d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0'); 
                let timeStr = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); 
                let rc = h.score<=25?'#10b981':(h.score<=50?'#f59e0b':'#ef4444'); 
                historyHtml += '<div class="history-item" data-id="'+h.id+'"><div><div class="history-score">'+h.score+' 分</div><div class="history-date">'+dateStr+'</div><div class="history-time">'+timeStr+'</div></div><div style="color:'+rc+';font-weight:600;">'+h.risk_level+'</div></div>'; 
            }
            if(historyList.length > 3 && !showAllHistory) {
                historyHtml += '<button class="btn-outline" id="showAllHistoryBtn" style="margin-top:12px;">📋 查看全部 ' + historyList.length + ' 条历史报告</button>';

            if(showAllHistory) {
                historyHtml += '<button class="btn-outline" id="hideAllHistoryBtn" style="margin-top:12px;">⬆️ 收起</button>';
            }
        }
        
        if(isEditing) {
            return '<div class="card"><h3 style="margin-bottom:16px;">✏️ 编辑个人资料</h3><select id="editGender" class="profile-select"><option value="">请选择性别</option><option value="男"'+(userProfile.gender==='男'?' selected':'')+'>男</option><option value="女"'+(userProfile.gender==='女'?' selected':'')+'>女</option></select><input type="number" id="editAge" class="profile-input" placeholder="年龄" value="'+(userProfile.age||'')+'" style="margin-top:12px;"><button class="btn-primary" id="saveProfileBtn" style="margin-top:16px;">保存修改</button><button class="btn-outline" id="cancelEditBtn" style="margin-top:10px;">取消</button></div><div class="card">'+historyHtml+'<button class="btn-outline" id="historyTestBtn" style="margin-top:16px;">📋 开始新评估</button></div><div class="footer-links"><a href="mailto:'+CONTACT_EMAIL+'">📧 联系我们</a> | <a href="#">隐私政策</a></div>';
        }
        
        let gd = userProfile.gender||'未设置', ad = userProfile.age?userProfile.age+' 岁':'未设置';
        return '<div class="card"><div class="flex-between" style="margin-bottom:16px;"><div><h3>我的健康档案</h3><p style="color:#64748b;font-size:13px;">'+currentUser.email+'</p></div><div><button id="logoutProfileBtn" class="logout-btn" style="background:#e2e8f0;color:#1e293b;border:none;border-radius:40px;padding:8px 16px;cursor:pointer;">退出</button><button id="editProfileBtn" style="margin-left:8px;background:#eef2f7;border:none;border-radius:40px;padding:8px 16px;cursor:pointer;">✏️ 编辑</button></div></div><div class="info-row"><span class="info-label"><span>👤</span> 性别</span><span>'+gd+'</span></div><div class="info-row"><span class="info-label"><span>🎂</span> 年龄</span><span>'+ad+'</span></div><div class="info-row"><span class="info-label"><span>📊</span> 最近评估分数</span><span style="font-weight:800;color:#0f6e3f;">'+(latestScore!==null?latestScore+' 分':'暂无')+'</span></div></div><div class="card" id="historyCard">'+historyHtml+'<button class="btn-outline" id="historyTestBtn" style="margin-top:16px;">📋 开始新评估</button></div><div class="footer-links"><a href="mailto:'+CONTACT_EMAIL+'">📧 联系我们</a> | <a href="#">隐私政策</a></div>';
    }

    function renderQuiz() { 
        let opts = ''; 
        for(let o of OPTIONS) opts += '<button class="option-btn ' + (answers[currentIndex]===o.rawScore?'selected':'') + '" onclick="selectAnswer(' + o.rawScore + ')">' + o.label + '</button>'; 
        
        let infoNote = '<div class="info-note">' +
            '📋 日常行为模式（如睡眠、活动轨迹）的长期、无感监测，可作为社区场景下认知功能减退的早期预警指标。异常活动轨迹与睡眠碎片化程度，能独立预测轻度认知损害向阿尔茨海默病转化的风险。' +
            '<div class="ref">参考来源：中国阿尔茨海默病协会（2023）. 认知障碍早期筛查社区实施专家共识；Dodge, H. H., et al. (2019). JAMA Network Open, 2(12), e1917644.</div>' +
            '</div>';
        
        return '<div class="quiz-card"><div class="progress-bar"><div class="progress-fill" style="width:' + ((currentIndex/QUESTIONS.length)*100) + '%;"></div></div><div class="flex-between" style="margin-bottom:16px;"><span>第' + (currentIndex+1) + '/' + QUESTIONS.length + '题</span><span style="color:#0f6e3f;">认知自测</span></div><div class="question-text">' + QUESTIONS[currentIndex] + '</div>' + opts + '<button class="btn-outline" id="prevBtn" ' + (currentIndex===0?'disabled style="opacity:0.5"':'') + '>← 上一题</button>' + infoNote + '</div>'; 
    }

    function renderResult() { 
        let score = getPercentScore(); 
        let risk = getRiskLevel(score);
        let aiDetail = getAIDetail(score, userProfile.age, userProfile.gender);
        return '<div class="card result-card">' +
            '<button class="home-btn" id="backHomeBtn">🏠 返回首页</button>' +
            '<div id="captureArea" style="text-align:center;"><h2 style="margin-top:8px;">📋 评估报告</h2>' +
            '<div class="score-circle"><span style="font-size:48px;font-weight:800;">' + score + '</span><span>/100</span></div>' +
            '<div class="risk-level ' + risk.class + '">' + risk.name + '</div>' +
            '<div class="ai-assessment">🤖 <strong>AI 评估建议</strong><br><br>' + aiDetail + '</div></div>' +
            '<div class="share-buttons"><button class="btn-share" id="shareImgBtn">📸 生成图片</button><button class="btn-share" id="shareUrlBtn">🔗 分享网址</button></div>' +
            '<button class="btn-outline" id="restartBtn" style="margin-top:16px;">重新测试</button></div>'; 
    }

    function renderHistoryDetail(h) { let d=new Date(h.created_at); return '<div class="detail-modal" id="detailModal"><div class="detail-card"><h3 style="margin-bottom:16px;">📋 评估详情</h3><div class="score-circle" style="width:100px;height:100px;"><span style="font-size:32px;font-weight:800;">'+h.score+'</span><span>/100</span></div><div class="risk-level" style="color:'+(h.score<=25?'#10b981':(h.score<=50?'#f59e0b':'#ef4444'))+'">'+h.risk_level+'</div><p style="margin:12px 0;color:#64748b;">评估时间：'+formatDateTime(d)+'</p><button class="detail-close" id="closeDetailBtn">关闭</button></div></div>'; }

    async function render() {
        let c = document.getElementById('mainContent'); if(!c) return;
        if(selectedHistory) { c.innerHTML = renderHistoryDetail(selectedHistory); document.getElementById('closeDetailBtn')?.addEventListener('click',()=>{ selectedHistory=null; render(); }); return; }
        let html=''; if(quizActive) html=renderQuiz(); else if(currentTab==='home') html=renderHome(); else if(currentTab==='device') html=renderDevice(); else if(currentTab==='profile') html=await renderProfile(); else if(currentTab==='result') html=renderResult(); else html=renderHome();
        c.innerHTML = html;
        document.querySelectorAll('.nav-item').forEach(n=>{ let t=n.getAttribute('data-tab'); if(currentTab===t||(currentTab==='result'&&t==='home')) n.classList.add('active'); else n.classList.remove('active'); });
        
        if(currentTab==='home' && document.querySelector('.banner-container')) { 
            startBannerLoop(); 
            const firstBanner = document.getElementById('bannerFirst');
            if(firstBanner) {
                firstBanner.style.cursor = 'pointer';
                firstBanner.addEventListener('click', (e) => {
                    e.stopPropagation();
                    quizActive = true;
                    answers.fill(null);
                    currentIndex = 0;
                    render();
                });
            }
            document.querySelector('.banner-container')?.addEventListener('click',(e)=>{
                if(e.target.closest('#bannerFirst')) return;
                if(currentBannerIndex===0) showToast("认知健康月活动：免费评估中");
                else if(currentBannerIndex===1) showToast("华为手环详情可邮件咨询");
            });
        } else { if(bannerInterval) clearInterval(bannerInterval); }
        
        const backHomeBtn = document.getElementById('backHomeBtn');
        if(backHomeBtn) backHomeBtn.addEventListener('click', () => { currentTab = 'home'; quizActive = false; render(); });
        
        const showAllBtn = document.getElementById('showAllHistoryBtn');
        if(showAllBtn) showAllBtn.addEventListener('click', () => { showAllHistory = true; render(); });
        const hideAllBtn = document.getElementById('hideAllHistoryBtn');
        if(hideAllBtn) hideAllBtn.addEventListener('click', () => { showAllHistory = false; render(); });
        
        document.getElementById('gotoDeviceBtn')?.addEventListener('click',()=>{ currentTab='device'; render(); });
        document.getElementById('historyTestBtn')?.addEventListener('click',()=>{ quizActive=true; answers.fill(null); currentIndex=0; render(); });
        document.getElementById('restartBtn')?.addEventListener('click',()=>{ quizActive=true; answers.fill(null); currentIndex=0; render(); });
        document.getElementById('prevBtn')?.addEventListener('click',()=>{ if(currentIndex>0){ currentIndex--; render(); } });
        document.getElementById('logoutBtn')?.addEventListener('click',async()=>{ await supabase.auth.signOut(); currentUser=null; render(); });
        document.getElementById('logoutProfileBtn')?.addEventListener('click',async()=>{ await supabase.auth.signOut(); currentUser=null; render(); });
        document.getElementById('gotoAuthBtn')?.addEventListener('click',()=>{ currentTab='profile'; render(); });
        document.getElementById('editProfileBtn')?.addEventListener('click',()=>{ isEditing=true; render(); });
        document.getElementById('cancelEditBtn')?.addEventListener('click',()=>{ isEditing=false; render(); });
        document.getElementById('saveProfileBtn')?.addEventListener('click',async()=>{ let g=document.getElementById('editGender')?.value||'', a=document.getElementById('editAge')?.value||''; await updateUserProfile(g,a); isEditing=false; render(); });
        document.getElementById('deviceContactBtn')?.addEventListener('click',()=>showToast("请发送邮件至 "+CONTACT_EMAIL+" 咨询"));
        document.getElementById('shareImgBtn')?.addEventListener('click',async()=>{ let el=document.getElementById('captureArea'); if(el){ let c=await html2canvas(el); let l=document.createElement('a'); l.download='cognitive_report.png'; l.href=c.toDataURL(); l.click(); showToast("报告已保存为图片"); } });
        document.getElementById('shareUrlBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(SHARE_URL); showToast("网址已复制"); });
        document.querySelectorAll('.history-item').forEach(item=>{ item.addEventListener('click',async()=>{ let id=item.getAttribute('data-id'); let list=await loadHistory(); let found=list.find(h=>String(h.id)===id); if(found){ selectedHistory=found; render(); } }); });
        let authSubmit = document.getElementById('authSubmitBtn');
        if(authSubmit) authSubmit.onclick = async()=>{ let email=document.getElementById('authEmail')?.value, pwd=document.getElementById('authPassword')?.value; if(!email||!pwd){ showToast("请填写完整"); return; } if(authMode==='login'){ let {data,error}=await supabase.auth.signInWithPassword({email,password:pwd}); if(error){ showToast(error.message); return; } currentUser=data.user; showToast("登录成功"); currentTab='home'; render(); } else { let {data,error}=await supabase.auth.signUp({email,password:pwd}); if(error){ showToast(error.message); return; } if(data.user){ await supabase.from('profiles').upsert({id:data.user.id,email:email}); showToast("注册成功！请查收验证邮件"); authMode='login'; render(); } } };
        let authSwitch = document.getElementById('authSwitchBtn'); if(authSwitch) authSwitch.onclick = ()=>{ authMode = authMode==='login'?'register':'login'; render(); };
    }

    window.selectAnswer = function(score) { if(!quizActive) return; answers[currentIndex]=score; if(currentIndex+1<QUESTIONS.length){ currentIndex++; render(); } else { let finalScore=getPercentScore(); quizActive=false; currentTab='result'; if(currentUser) saveScoreToSupabase(finalScore); render(); } };

    async function init() { let {data:{user}} = await supabase.auth.getUser(); if(user) currentUser=user; render(); document.querySelectorAll('.nav-item').forEach(nav=>{ nav.addEventListener('click',()=>{ let tab=nav.getAttribute('data-tab'); if(tab==='home'){ quizActive=false; currentTab='home'; render(); } else if(tab==='device'){ quizActive=false; currentTab='device'; render(); } else if(tab==='profile'){ quizActive=false; currentTab='profile'; render(); } }); }); }
    init();
})();
</script>
</body>
</html>
